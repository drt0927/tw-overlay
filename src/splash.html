<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <script src="assets/tailwind.min.js"></script>
  <style>
    body { background: transparent; overflow: hidden; }
    .splash-card {
      background: rgba(15, 18, 30, 0.95);
      border: 1px solid rgba(168, 85, 247, 0.4);
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
    }
    .loader {
      border: 3px solid rgba(168, 85, 247, 0.1);
      border-top: 3px solid #a855f7;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="flex items-center justify-center h-screen w-screen">
  <div class="splash-card w-72 p-10 rounded-3xl flex flex-col items-center gap-6 border border-white/10">
    <div class="relative">
      <!-- 앱 전용 .ico 아이콘 노출 -->
      <div class="w-24 h-24 flex items-center justify-center">
        <img src="icons/icon.ico" alt="App Icon" class="w-20 h-20 drop-shadow-[0_0_15px_rgba(168,85,247,0.5)]">
      </div>
      <div class="absolute -bottom-1 -right-1 bg-slate-900 p-1.5 rounded-full border border-purple-500/30">
        <div class="loader"></div>
      </div>
    </div>
    
    <div class="text-center space-y-2">
      <h1 class="text-2xl font-black text-white tracking-tight">TW-Overlay</h1>
      <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em] animate-pulse">Initializing System...</p>
    </div>

    <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden mt-2">
      <div class="bg-gradient-to-r from-purple-600 to-indigo-500 h-full w-1/3 animate-[loading_2s_ease-in-out_infinite]"></div>
    </div>
  </div>

  <style>
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
  </style>
</body>
</html>
