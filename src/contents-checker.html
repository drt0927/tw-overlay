<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>TW-Overlay - Contents Checker</title>
    <link rel="stylesheet" href="style.css">
    <script src="assets/tailwind.min.js"></script>
    <script src="assets/lucide.min.js"></script>
    <style>
        body {
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        .drag-handle {
            padding: 16px 20px;
            cursor: move;
            -webkit-app-region: drag;
            background: linear-gradient(to bottom, rgba(34, 211, 238, 0.15), transparent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .no-drag { -webkit-app-region: no-drag !important; }

        .item-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            -webkit-app-region: no-drag !important; /* 이 영역에서 창 드래그가 발생하지 않도록 함 */
        }

        .item-card.dragging {
            opacity: 0.1; /* 드래그 중인 원본 요소는 거의 투명하게 */
        }

        .drag-placeholder {
            background: rgba(34, 211, 238, 0.1);
            border: 2px dashed rgba(34, 211, 238, 0.4);
            border-radius: 14px;
            margin: 4px 0;
            pointer-events: none;
        }

        /* 일일 숙제 특화 색상 (Blue) */
        .item-card.daily:hover { border-color: rgba(59, 130, 246, 0.4); }
        .item-card.daily .category-badge { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border-color: rgba(59, 130, 246, 0.2); }
        
        /* 주간 숙제 특화 색상 (Cyan) */
        .item-card.weekly:hover { border-color: rgba(34, 211, 238, 0.4); }
        .item-card.weekly .category-badge { background: rgba(34, 211, 238, 0.15); color: #22d3ee; border-color: rgba(34, 211, 238, 0.2); }

        /* 조회모드 전용 완료 스타일 */
        body:not(.edit-mode) .item-card.completed {
            opacity: 0.45;
            background: rgba(0, 0, 0, 0.2);
        }

        body:not(.edit-mode) .item-card.completed .check-box {
            background: #22c55e;
            border-color: #22c55e;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.3);
        }

        /* 편집모드 전용 스타일: 딤드 해제 및 체크박스 숨김 */
        .edit-mode .item-card {
            opacity: 1 !important;
            background: rgba(255, 255, 255, 0.03) !important;
            border-color: rgba(245, 158, 11, 0.2);
            cursor: default;
        }
        .edit-mode .check-box { display: none; }

        .check-box {
            width: 22px;
            height: 22px;
            border-radius: 7px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .category-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .edit-mode .category-badge {
            background: rgba(245, 158, 11, 0.1) !important;
            color: #fbbf24 !important;
            border-color: rgba(245, 158, 11, 0.2) !important;
        }

        .edit-mode .item-card.hidden-item {
            opacity: 0.4 !important;
            border-style: dashed;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.01) 10px, rgba(255,255,255,0.01) 20px);
        }

        .hidden-item:not(.edit-mode *) {
            display: none;
        }

        .manage-tag {
            background: #f59e0b;
            color: white;
            font-size: 9px;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 24px 4px 12px 4px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .progress-container {
            padding: 0 20px;
            margin-top: 10px;
        }

        .progress-bar-bg {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #22d3ee, #06b6d4);
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 컨트롤 버튼 스타일 */
        .control-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.4);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .control-btn.active {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.15);
        }

        .add-form-container {
            background: rgba(15, 18, 30, 0.98);
            border-top: 1px solid rgba(34, 211, 238, 0.2);
            padding: 20px;
            display: none; /* 기본적으로 숨김 */
            z-index: 50;
        }

        .add-form-container.show {
            display: block;
            animation: slideUp 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }


        input, select {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 10px !important;
            color: white !important;
            font-weight: 600 !important;
            outline: none !important;
        }

        input:focus, select:focus {
            border-color: #a855f7 !important;
        }

        /* 검색 영역 스타일 */
        .search-container {
            padding: 0 16px;
            margin-top: 12px;
        }
        .search-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            transition: all 0.2s;
        }
        .search-box:focus-within {
            border-color: rgba(34, 211, 238, 0.4);
            background: rgba(0, 0, 0, 0.3);
        }
        .search-input {
            background: transparent !important;
            border: none !important;
            font-size: 12px !important;
            padding: 8px 4px !important;
            width: 100%;
        }

        /* 드래그 앤 드롭 스타일 */
        .item-card {
            -webkit-app-region: no-drag !important;
            user-select: none !important; /* 텍스트 선택 방지 */
        }

        .item-card.dragging {
            opacity: 0.2;
            transform: scale(0.98);
            border: 1px dashed rgba(34, 211, 238, 0.5) !important;
        }

        .drag-placeholder {
            background: rgba(34, 211, 238, 0.05);
            border: 2px dashed rgba(34, 211, 238, 0.2);
            border-radius: 14px;
            margin: 4px 0;
            pointer-events: none;
        }

        .drag-handle-icon {
            display: none;
            color: rgba(255, 255, 255, 0.2);
            cursor: grab;
            padding: 8px;
            margin: -8px;
            margin-right: 4px;
            border-radius: 6px;
            transition: all 0.2s;
            -webkit-app-region: no-drag !important;
            pointer-events: auto !important;
        }

        .drag-handle-icon:hover {
            color: #22d3ee;
            background: rgba(255, 255, 255, 0.05);
        }

        .edit-mode .drag-handle-icon {
            display: block;
        }

        .edit-mode .item-card {
            cursor: default !important;
        }
    </style>
</head>

<body class="panel-glass p-0 flex flex-col">
    <!-- Header -->
    <div class="win-header">
        <div class="win-title-area">
            <div id="header-icon-box" class="win-icon-box bg-cyan-500/10 border-cyan-500/20">
                <i id="header-icon" data-lucide="check-square" class="w-5 h-5 text-cyan-400"></i>
            </div>
            <div class="win-title-text">
                <div class="flex items-center">
                    <span class="win-title-main">숙제 체크리스트</span>
                    <span id="mode-badge" class="manage-tag hidden">관리 모드</span>
                </div>
                <span id="progress-percent-text" class="win-title-sub">불러오는 중...</span>
            </div>
        </div>
        <div class="win-controls">
            <button id="btn-reset" class="win-btn" title="상태 동기화">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
            <button id="btn-edit" class="win-btn" title="관리 모드 토글">
                <i id="edit-icon" data-lucide="settings-2" class="w-4 h-4"></i>
            </button>
            <button onclick="window.electronAPI.toggleContentsChecker()" class="win-btn win-close-btn" title="닫기">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- Search Box -->
    <div class="search-container no-drag">
        <div class="search-box">
            <i data-lucide="search" class="w-3.5 h-3.5 text-slate-500"></i>
            <input id="search-input" type="text" placeholder="숙제 이름이나 카테고리 검색..." class="search-input" oninput="render()">
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div class="progress-bar-bg">
            <div id="progress-fill" class="progress-bar-fill" style="width: 0%"></div>
        </div>
    </div>

    <!-- Content List -->
    <div id="content-list" class="flex-1 overflow-y-auto custom-scroll p-4 pt-0 no-drag">
        <!-- Rendered items -->
    </div>

    <!-- Add Form (Edit Mode Only) -->
    <div id="add-form" class="add-form-container no-drag shadow-2xl">
        <div class="flex items-center justify-between mb-4">
            <span class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">새로운 숙제 추가</span>
            <button onclick="toggleEditMode()" class="text-[10px] text-slate-500 hover:text-white font-bold">닫기</button>
        </div>
        <div class="space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <input id="new-item-name" type="text" placeholder="숙제 이름" class="w-full text-xs px-3 py-2.5">
                <input id="new-item-category" type="text" placeholder="카테고리" class="w-full text-xs px-3 py-2.5">
            </div>
            <div class="flex gap-2">
                <select id="new-item-type" class="flex-1 text-xs px-3 py-2.5" onchange="updateFormVisibility()">
                    <option value="daily">매일 초기화</option>
                    <option value="weekly">매주 초기화</option>
                </select>
                <select id="new-item-hour" class="w-24 text-xs px-3 py-2.5"></select>
            </div>
            <div id="weekly-only-fields" class="hidden">
                <select id="new-item-day" class="w-full text-xs px-3 py-2.5">
                    <option value="1">월요일 (기본)</option>
                    <option value="2">화요일</option>
                    <option value="3">수요일</option>
                    <option value="4">목요일 (청소)</option>
                    <option value="5">금요일</option>
                    <option value="6">토요일</option>
                    <option value="0">일요일</option>
                </select>
            </div>
            <button id="btn-add-item" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white text-xs font-black py-3 rounded-xl shadow-lg shadow-cyan-900/30 transition-all active:scale-[0.98]">
                목록에 추가하기
            </button>
        </div>
    </div>

    <!-- Custom Prompt Modal (Replacement for window.prompt) -->
    <div id="custom-prompt" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] hidden no-drag">
        <div class="bg-slate-900 border border-cyan-500/30 p-6 rounded-2xl w-80 shadow-2xl">
            <div id="prompt-title" class="text-[10px] font-black text-cyan-400 uppercase mb-4 tracking-widest">수정</div>
            <input id="prompt-input" type="text" class="w-full text-xs px-3 py-2.5 mb-4 focus:border-cyan-500">
            <div class="flex gap-2">
                <button id="prompt-cancel" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white text-[10px] font-bold py-2 rounded-lg transition-colors">취소</button>
                <button id="prompt-ok" class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white text-[10px] font-bold py-2 rounded-lg transition-colors">확인</button>
            </div>
        </div>
    </div>

    <script>
        let isEditMode = false;
        let configData = null;
        let dragSrcId = null;
        let isDragging = false; // 드래그 진행 여부 플래그
        let autoScrollTimer = null;
        let placeholder = null; // 플레이스홀더 엘리먼트
        let promptCallback = null; // 커스텀 프롬프트 콜백
        const DAYS = ['일', '월', '화', '수', '목', '금', '토'];

        // 시간 셀렉트박스 초기화
        const hourSelect = document.getElementById('new-item-hour');
        for (let i = 0; i < 24; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `${String(i).padStart(2, '0')}:00`;
            hourSelect.appendChild(opt);
        }

        function updateFormVisibility() {
            const type = document.getElementById('new-item-type').value;
            document.getElementById('weekly-only-fields').classList.toggle('hidden', type === 'daily');
        }

        function render() {
            // 드래그 중에는 화면을 다시 그리지 않음 (드래그 끊김 방지)
            if (isDragging) return;
            if (!configData || !configData.contentsCheckerItems) return;

            const container = document.getElementById('content-list');
            const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            container.innerHTML = '';

            const items = configData.contentsCheckerItems;
            
            // 검색 필터링
            const filteredItems = items.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchQuery) || 
                                    item.category.toLowerCase().includes(searchQuery);
                return matchesSearch;
            });

            // 진척도 계산 (전체 아이템 기준)
            const activeItems = items.filter(i => i.isVisible);
            const completedCount = activeItems.filter(i => i.isCompleted).length;
            const totalCount = activeItems.length;
            const percent = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;
            
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('progress-percent-text').textContent = `PROGRESS: ${percent}% (${completedCount}/${totalCount})`;

            // 편집(관리) 모드와 조회 모드의 섹션 구성 분리
            if (isEditMode) {
                const dailyItems = filteredItems.filter(i => i.resetRule.type === 'daily');
                const weeklyItems = filteredItems.filter(i => i.resetRule.type === 'weekly');

                if (dailyItems.length > 0) {
                    renderSection(container, '일일 숙제 (전체)', 'sun', dailyItems, 'daily');
                }
                if (weeklyItems.length > 0) {
                    renderSection(container, '주간 숙제 (전체)', 'calendar', weeklyItems, 'weekly');
                }
            } else {
                const incompleteDaily = filteredItems.filter(i => !i.isCompleted && i.resetRule.type === 'daily');
                const incompleteWeekly = filteredItems.filter(i => !i.isCompleted && i.resetRule.type === 'weekly');
                const completedItems = filteredItems.filter(i => i.isCompleted);

                if (incompleteDaily.some(i => i.isVisible)) {
                    renderSection(container, '일일 숙제', 'sun', incompleteDaily, 'daily');
                }
                if (incompleteWeekly.some(i => i.isVisible)) {
                    renderSection(container, '주간 숙제', 'calendar', incompleteWeekly, 'weekly');
                }
                if (completedItems.some(i => i.isVisible)) {
                    renderSection(container, '완료됨', 'check-circle-2', completedItems, 'completed');
                }
            }

            lucide.createIcons();
        }

        function renderSection(container, title, icon, items, sectionType) {
            const isWeeklySection = sectionType === 'weekly';
            const isCompletedSection = sectionType === 'completed';
            
            let accentColorClass = 'text-blue-400';
            if (isWeeklySection) accentColorClass = 'text-purple-400';
            if (isCompletedSection) accentColorClass = 'text-green-400';

            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerHTML = `<i data-lucide="${icon}" class="w-3.5 h-3.5 ${accentColorClass}"></i><span class="${accentColorClass}">${title}</span>`;
            container.appendChild(header);

            const sortedItems = [...items].sort((a, b) => {
                const aOrder = a.sortOrder ?? 0;
                const bOrder = b.sortOrder ?? 0;
                if (aOrder !== bOrder) return aOrder - bOrder;
                return a.name.localeCompare(b.name);
            });

            const listDiv = document.createElement('div');
            listDiv.className = 'space-y-2 item-group-container';
            listDiv.dataset.type = sectionType;

            sortedItems.forEach((item) => {
                if (!item.isVisible && !isEditMode) return;

                const card = document.createElement('div');
                const itemType = item.resetRule.type;
                card.className = `item-card ${itemType} ${item.isCompleted ? 'completed' : ''} ${!item.isVisible ? 'hidden-item' : ''}`;
                card.dataset.id = item.id;
                
                // 관리 모드일 때만 드래그 가능 설정
                if (isEditMode && !document.getElementById('search-input').value.trim()) {
                    card.draggable = true;
                } else {
                    card.draggable = false;
                }

                const timeStr = String(item.resetRule.hour || 0).padStart(2, '0') + ':00';
                const resetInfo = item.resetRule.type === 'daily' ? `매일 ${timeStr}` : `${DAYS[item.resetRule.dayOfWeek || 1]} ${timeStr}`;

                const periodBadge = isCompletedSection 
                    ? `<span class="px-1.5 py-0.5 rounded text-[8px] font-black uppercase ${itemType === 'daily' ? 'bg-blue-500/20 text-blue-400' : 'bg-purple-500/20 text-purple-400'}">${itemType === 'daily' ? 'DAILY' : 'WEEKLY'}</span>`
                    : '';

                card.innerHTML = `
                    <i data-lucide="grip-vertical" class="drag-handle-icon w-4 h-4 mr-1"></i>
                    <div class="check-box ${item.isCompleted ? 'checked' : ''}">
                        <i data-lucide="check" class="w-3.5 h-3.5 text-white"></i>
                    </div>
                    <div class="flex-1 min-w-0 pointer-events-none">
                        <div class="flex items-center gap-2 mb-0.5">
                            <span class="category-badge">${item.category}</span>
                            <span class="text-sm font-bold truncate">${item.name}</span>
                            ${periodBadge}
                        </div>
                        <div class="text-[10px] text-slate-500 font-bold flex items-center gap-1">
                            <i data-lucide="clock" class="w-2.5 h-2.5"></i>
                            초기화: ${resetInfo}
                            ${isEditMode && !item.isVisible ? '<span class="ml-2 text-red-400 text-[9px] border border-red-400/30 px-1 rounded-sm">숨김 상태</span>' : ''}
                        </div>
                    </div>
                    ${isEditMode ? `
                        <div class="flex items-center gap-1 no-drag relative z-10">
                            <button class="control-btn btn-toggle-visibility ${item.isVisible ? 'active' : ''}" onclick="event.stopPropagation(); window.electronAPI.contentsToggleVisibility('${item.id}')">
                                <i data-lucide="${item.isVisible ? 'eye' : 'eye-off'}" class="w-4 h-4"></i>
                            </button>
                            ${item.isCustom ? `
                                <button class="control-btn btn-edit-name hover:text-amber-400" onclick="event.stopPropagation(); editName('${item.id}', \`${item.name.replace(/'/g, "\\'")}\`)">
                                    <i data-lucide="edit-2" class="w-4 h-4"></i>
                                </button>
                                <button class="control-btn btn-remove-item hover:text-red-400" onclick="event.stopPropagation(); removeItem('${item.id}')">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            ` : ''}
                        </div>
                    ` : ''}
                `;

                if (!isEditMode) {
                    card.onclick = () => window.electronAPI.contentsToggleItem(item.id);
                }

                listDiv.appendChild(card);
            });
            container.appendChild(listDiv);
        }

        // 컨테이너에 드래그 이벤트 위임 등록
        const contentList = document.getElementById('content-list');
        
        contentList.ondragstart = (e) => {
            const card = e.target.closest('.item-card');
            if (!card || !isEditMode) return;

            console.log('[DRAG] Start:', card.dataset.id);
            isDragging = true;
            dragSrcId = card.dataset.id;
            card.classList.add('dragging');
            
            placeholder = document.createElement('div');
            placeholder.className = 'drag-placeholder';
            placeholder.style.height = card.offsetHeight + 'px';
            
            // 드래그 시작 시 현재 위치에 플레이스홀더 즉시 삽입 (로그의 'not found' 에러 방지)
            card.parentNode.insertBefore(placeholder, card.nextSibling);
            
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', dragSrcId);
            
            // 드래그 이미지 생성 후 원본 숨김
            setTimeout(() => { 
                if (isDragging) card.style.display = 'none'; 
            }, 0);
        };

        // window 수준에서 dragover를 잡아 이벤트가 끊기는 것을 방지
        window.ondragover = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';

            const targetCard = e.target.closest('.item-card');
            const container = document.getElementById('content-list');
            
            // 자동 스크롤 로직
            const rect = container.getBoundingClientRect();
            if (e.clientY < rect.top + 50) startAutoScroll('up');
            else if (e.clientY > rect.bottom - 50) startAutoScroll('down');
            else stopAutoScroll();

            if (targetCard && targetCard.dataset.id !== dragSrcId) {
                const targetRect = targetCard.getBoundingClientRect();
                const midpoint = targetRect.top + targetRect.height / 2;
                const isAfter = e.clientY > midpoint;
                const nextSibling = isAfter ? targetCard.nextSibling : targetCard;

                // 위치가 실제로 바뀔 때만 DOM 조작 (깜빡임 방지 핵심)
                if (placeholder.nextSibling !== nextSibling || placeholder.parentNode !== targetCard.parentNode) {
                    targetCard.parentNode.insertBefore(placeholder, nextSibling);
                }
            } else if (e.target === container || e.target.classList.contains('item-group-container')) {
                const group = e.target.closest('.item-group-container') || e.target.querySelector('.item-group-container');
                if (group && placeholder.parentNode !== group) {
                    group.appendChild(placeholder);
                }
            }
        };

        contentList.ondragend = (e) => {
            console.log('[DRAG] End');
            stopAutoScroll();
            
            const card = Array.from(document.querySelectorAll('.item-card')).find(c => c.dataset.id === dragSrcId);
            
            if (card) {
                card.classList.remove('dragging');
                card.style.display = 'flex';
                
                if (placeholder && placeholder.parentNode) {
                    placeholder.parentNode.replaceChild(card, placeholder);
                    
                    // 순서 저장
                    const finalOrder = Array.from(document.querySelectorAll('.item-card')).map(c => c.dataset.id);
                    window.electronAPI.contentsReorderList(finalOrder);
                    console.log('[DRAG] Reorder saved');
                }
            }
            
            isDragging = false;
            placeholder = null;
            dragSrcId = null;
            render();
        };

        // 드래그가 캔슬되었을 때를 대비한 윈도우 수준의 정리
        window.ondragend = () => {
            if (isDragging) {
                console.log('[DRAG] Global dragend fallback triggered');
                const card = document.querySelector('.item-card.dragging');
                if (card) {
                    card.classList.remove('dragging');
                    card.style.opacity = '';
                }
                if (placeholder && placeholder.parentNode) placeholder.remove();
                isDragging = false;
                dragSrcId = null;
                placeholder = null;
                render();
            }
        };

        function startAutoScroll(direction) {
            if (autoScrollTimer) return;
            const container = document.getElementById('content-list');
            const speed = 10; 
            autoScrollTimer = setInterval(() => {
                container.scrollTop += (direction === 'up' ? -speed : speed);
            }, 16);
        }

        function stopAutoScroll() {
            if (autoScrollTimer) {
                clearInterval(autoScrollTimer);
                autoScrollTimer = null;
            }
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const body = document.body;
            const headerBox = document.getElementById('header-icon-box');
            const headerIcon = document.getElementById('header-icon');
            const editIcon = document.getElementById('edit-icon');
            const modeBadge = document.getElementById('mode-badge');
            const addForm = document.getElementById('add-form');

            if (isEditMode) {
                body.classList.add('edit-mode');
                headerBox.classList.replace('bg-purple-500/20', 'bg-amber-500/20');
                headerBox.classList.replace('border-purple-500/30', 'border-amber-500/30');
                headerIcon.classList.replace('text-purple-400', 'text-amber-400');
                headerIcon.setAttribute('data-lucide', 'sliders-horizontal');
                editIcon.setAttribute('data-lucide', 'check');
                editIcon.classList.replace('text-slate-400', 'text-green-400');
                modeBadge.classList.remove('hidden');
                addForm.classList.add('show');
            } else {
                body.classList.remove('edit-mode');
                headerBox.classList.replace('bg-amber-500/20', 'bg-purple-500/20');
                headerBox.classList.replace('border-amber-500/30', 'border-purple-500/30');
                headerIcon.classList.replace('text-amber-400', 'text-purple-400');
                headerIcon.setAttribute('data-lucide', 'check-square');
                editIcon.setAttribute('data-lucide', 'settings-2');
                editIcon.classList.replace('text-green-400', 'text-slate-400');
                modeBadge.classList.add('hidden');
                addForm.classList.remove('show');
            }
            lucide.createIcons();
            render();
        }

        function showCustomPrompt(title, defaultValue, callback) {
            document.getElementById('prompt-title').textContent = title;
            const input = document.getElementById('prompt-input');
            input.value = defaultValue;
            document.getElementById('custom-prompt').classList.remove('hidden');
            input.focus();
            input.select();
            
            promptCallback = callback;
        }

        document.getElementById('prompt-ok').onclick = () => {
            const val = document.getElementById('prompt-input').value.trim();
            if (promptCallback) promptCallback(val);
            document.getElementById('custom-prompt').classList.add('hidden');
            promptCallback = null;
        };

        document.getElementById('prompt-cancel').onclick = () => {
            document.getElementById('custom-prompt').classList.add('hidden');
            promptCallback = null;
        };

        document.getElementById('prompt-input').onkeydown = (e) => {
            if (e.key === 'Enter') document.getElementById('prompt-ok').click();
            if (e.key === 'Escape') document.getElementById('prompt-cancel').click();
        };

        function editCategory(id, current) {
            showCustomPrompt('카테고리 변경', current, (next) => {
                if (next) window.electronAPI.contentsUpdateCategory(id, next);
            });
        }

        function editName(id, current) {
            showCustomPrompt('숙제 이름 변경', current, (next) => {
                if (next) window.electronAPI.contentsUpdateName(id, next);
            });
        }

        function removeItem(id) {
            if (confirm('이 숙제를 삭제할까요?')) {
                window.electronAPI.contentsRemoveItem(id);
            }
        }

        // 이벤트 리스너 등록
        document.getElementById('btn-edit').onclick = toggleEditMode;
        document.getElementById('btn-reset').onclick = () => {
            if (confirm('모든 숙제의 초기화 시간을 다시 체크할까요?')) {
                window.electronAPI.contentsManualReset();
            }
        };

        document.getElementById('btn-add-item').onclick = () => {
            const name = document.getElementById('new-item-name').value.trim();
            const category = document.getElementById('new-item-category').value.trim() || '기타';
            const type = document.getElementById('new-item-type').value;
            const hour = parseInt(document.getElementById('new-item-hour').value);
            const dayOfWeek = parseInt(document.getElementById('new-item-day').value);

            if (!name) return alert('숙제 이름을 입력하세요.');
            const rule = { type, hour };
            if (type === 'weekly') rule.dayOfWeek = dayOfWeek;

            window.electronAPI.contentsAddCustom(name, category, rule);
            document.getElementById('new-item-name').value = '';
        };

        if (window.electronAPI && window.electronAPI.onConfigData) {
            window.electronAPI.onConfigData((data) => {
                configData = data;
                render();
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        // ESC 키 닫기 지원 (편집 모드 시 편집 모드만 해제)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (isEditMode) toggleEditMode();
                else window.close();
            }
        });
    </script>
</body>

</html>
