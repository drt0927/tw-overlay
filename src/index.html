<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <script src="assets/tailwind.min.js"></script>
  <script src="assets/lucide.min.js"></script>
</head>

<body>
  <div id="wrapper" class="sidebar-wrapper">
    <!-- 사이드바 접기/펴기 -->
    <div class="toggle-btn cursor-pointer" onclick="window.electronAPI.toggleSidebar()" title="사이드바 토글">
      <i id="toggle-icon" data-lucide="chevron-left"></i>
    </div>

    <!-- 갤러리 모니터 버튼 -->
    <div id="gallery-btn" class="gallery-btn p-2 cursor-pointer text-slate-400 hover:text-purple-400 relative"
      onclick="openGallery()" onmouseenter="showTooltip('갤러리 모니터', this)" onmouseleave="hideTooltip()">
      <i data-lucide="bell" class="w-4 h-4"></i>
      <span id="noti-badge" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full hidden"></span>
    </div>

    <!-- 약어 사전 버튼 -->
    <div id="abbreviation-btn" class="p-2 cursor-pointer text-slate-400 hover:text-purple-400 relative"
      onclick="window.electronAPI.toggleAbbreviation()" onmouseenter="showTooltip('약어 사전', this)" onmouseleave="hideTooltip()">
      <i data-lucide="book-open" class="w-4 h-4"></i>
    </div>

    <!-- 버프 백과 버튼 -->
    <div id="buffs-btn" class="p-2 cursor-pointer text-slate-400 hover:text-yellow-400 relative"
      onclick="window.electronAPI.toggleBuffs()" onmouseenter="showTooltip('버프 백과 & 계산기', this)" onmouseleave="hideTooltip()">
      <i data-lucide="zap" class="w-4 h-4"></i>
    </div>

    <!-- 필드보스 알림 설정 버튼 -->
    <div id="boss-btn" class="p-2 cursor-pointer text-slate-400 hover:text-blue-400 relative"
      onclick="window.electronAPI.toggleBossSettings()" onmouseenter="showTooltip('필드보스 알림 설정', this)" onmouseleave="hideTooltip()">
      <i data-lucide="alarm-clock" class="w-4 h-4"></i>
    </div>

    <!-- 장판 감시 영역 -->
    <div id="zone-btn" class="p-2 cursor-pointer text-slate-400 hover:text-green-400 transition-colors"
      onclick="toggleZone()" onmouseenter="showTooltip('장판 감시 설정', this)" onmouseleave="hideTooltip()">
      <i id="zone-icon" data-lucide="target" class="w-4 h-4"></i>
    </div>

    <!-- 퀵슬롯 컨테이너 -->
    <div id="slot-container" class="slot-container flex flex-col gap-2 mt-2"></div>

    <!-- 홈 버튼 -->
    <div id="home-btn" class="mt-auto p-2 cursor-pointer text-slate-400 hover:text-purple-400" onclick="window.electronAPI.goHome()"
      onmouseenter="showTooltip('홈 페이지', this)" onmouseleave="hideTooltip()">
      <i data-lucide="home" class="w-4 h-4"></i>
    </div>

    <!-- 하단 유틸리티 버튼 -->
    <div id="overlay-toggle-btn" class="p-2 cursor-pointer text-slate-400 hover:text-white"
      onclick="window.electronAPI.toggleOverlay()" onmouseenter="showTooltip('오버레이 토글', this)" onmouseleave="hideTooltip()">
      <i id="overlay-icon" data-lucide="layout" class="w-4 h-4"></i>
    </div>

    <div id="click-through-btn" class="p-2 cursor-pointer text-slate-400 hover:text-white"
      onclick="window.electronAPI.toggleClickThrough()" onmouseenter="showTooltip('마우스 투과 토글 (Ctrl+Shift+T)', this)" onmouseleave="hideTooltip()">
      <i id="click-through-icon" data-lucide="mouse-pointer-2" class="w-4 h-4"></i>
    </div>

    <div class="p-2 cursor-pointer text-slate-400 hover:text-purple-400 relative"
      onclick="window.electronAPI.toggleSettings()" onmouseenter="showTooltip('환경 설정', this)" onmouseleave="hideTooltip()">
      <i data-lucide="settings" class="w-4 h-4"></i>
      <span id="update-badge" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full hidden"></span>
    </div>

    <div class="p-2 pb-4 cursor-pointer text-slate-400 hover:text-red-500" onclick="window.electronAPI.closeApp()"
      onmouseenter="showTooltip('앱 종료', this)" onmouseleave="hideTooltip()">
      <i data-lucide="power" class="w-4 h-4"></i>
    </div>
  </div>

  <!-- 툴팁 -->
  <div id="tooltip" class="tw-tooltip"></div>
  <!-- 오디오 재생기 -->
  <audio id="boss-audio" class="hidden"></audio>

  <script>
    function refreshIcons() { lucide.createIcons(); }
    const tooltip = document.getElementById('tooltip');
    const bossAudio = document.getElementById('boss-audio');
    let bossNotifyVolume = 0.5;

    function showTooltip(text, el) {
      const rect = el.getBoundingClientRect();
      tooltip.innerText = text;
      tooltip.style.top = `${rect.top + 4}px`;
      tooltip.style.display = 'flex';
    }

    function hideTooltip() {
      tooltip.style.display = 'none';
    }

    // 필드보스 알림 수신 및 사운드 재생
    window.electronAPI.onPlayBossSound(({ bossName, soundFile, volume }) => {
      if (!soundFile) return;
      bossAudio.src = `assets/sound/${soundFile}`;

      // 전달받은 volume(0~100)이 있으면 사용, 없으면 설정된 기본값 사용
      if (volume !== undefined && volume !== null) {
        bossAudio.volume = volume / 100;
      } else {
        bossAudio.volume = bossNotifyVolume;
      }

      bossAudio.play().catch(e => console.error('Audio play failed:', e));

      // 알림이 왔을 때 버튼 강조 효과 (옵션)
      const btn = document.getElementById('boss-btn');
      btn.classList.add('animate-bounce', 'text-blue-400');
      setTimeout(() => btn.classList.remove('animate-bounce'), 5000);
    });

        // 감시 상태 수신 → 아이콘 업데이트
        window.electronAPI.onScreenWatcherStatus((isWatching) => {
          const icon = document.getElementById('zone-icon');
          const btn = document.getElementById('zone-btn');
          
          // 상태 변경 시 무조건 깜빡임 제거
          btn.classList.remove('animate-pulse');
    
          if (isWatching) {
            icon.setAttribute('data-lucide', 'shield-check');
            btn.classList.remove('text-slate-400', 'text-purple-400');
            btn.classList.add('text-green-400');
            btn.title = '감시 중 (클릭하여 중지)';
          } else {
            icon.setAttribute('data-lucide', 'target');
            btn.classList.remove('text-green-400', 'text-purple-400');
            btn.classList.add('text-slate-400');
            btn.title = '감시 영역 설정';
          }
          refreshIcons();
        });
    
        // 모니터 존 창 상태 수신 (설정 창 열림/닫힘)
        window.electronAPI.onMonitorZoneWindowStatus((isOpen) => {
          const btn = document.getElementById('zone-btn');
          // 창 상태가 변하면 깜빡임 중지
          btn.classList.remove('animate-pulse');
    
          if (isOpen) {
            btn.classList.add('text-purple-400');
            btn.classList.remove('text-slate-400', 'text-green-400');
          } else {
            // 창이 닫힐 때, 감시 중이 아니라면 기본색으로
            if (!btn.classList.contains('text-green-400')) {
              btn.classList.remove('text-purple-400');
              btn.classList.add('text-slate-400');
            }
          }
        });
    // 오버레이 아이콘 갱신 함수
    function updateOverlayIcon(isVisible) {
      const iconContainer = document.getElementById('overlay-toggle-btn');
      if (iconContainer) {
        iconContainer.innerHTML = `<i id="overlay-icon" data-lucide="${isVisible ? 'layout-template' : 'layout'}" class="w-4 h-4 ${isVisible ? 'text-white' : 'text-slate-600'}"></i>`;
        refreshIcons();
      }
    }

    // 사이드바 상태 반영
    window.electronAPI.onSidebarStatus((isCollapsed) => {
      document.getElementById('wrapper').className = isCollapsed ? 'sidebar-wrapper collapsed' : 'sidebar-wrapper';
      document.getElementById('toggle-icon').setAttribute('data-lucide', isCollapsed ? 'chevron-right' : 'chevron-left');
      tooltip.style.display = 'none';
      refreshIcons();
    });

    // 오버레이 아이콘 갱신 이벤트 수신
    window.electronAPI.onOverlayStatus(updateOverlayIcon);

    // 마우스 투과 상태 수신
    window.electronAPI.onClickThroughStatus((isClickThrough) => {
      const icon = document.getElementById('click-through-icon');
      const btn = document.getElementById('click-through-btn');
      if (isClickThrough) {
        icon.setAttribute('data-lucide', 'mouse-pointer-off');
        btn.classList.add('text-green-400');
        btn.classList.remove('text-slate-400');
      } else {
        icon.setAttribute('data-lucide', 'mouse-pointer-2');
        btn.classList.add('text-slate-400');
        btn.classList.remove('text-green-400');
      }
      refreshIcons();
    });

    // 설정 데이터 수신 및 슬롯 렌더링
    window.electronAPI.onConfigData((config) => {
      // 보스 알림 음량 업데이트 (0.0 ~ 1.0 범위)
      bossNotifyVolume = (config.fieldBossNotifyVolume !== undefined ? config.fieldBossNotifyVolume : 50) / 100;

      // 메뉴 노출 제어 (기본값은 모두 노출)
      const menuIds = ['gallery-btn', 'abbreviation-btn', 'buffs-btn', 'boss-btn', 'zone-btn', 'home-btn', 'overlay-toggle-btn', 'click-through-btn'];
      const visibleMenuIds = config.visibleMenuIds || menuIds;
      
      menuIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = visibleMenuIds.includes(id) ? 'flex' : 'none';
      });

      // 초기 상태 아이콘 설정 (onOverlayStatus와 연동되므로 여기서 명시적 호출 제거 가능)
      const isVisible = config.overlayVisible !== false;
      updateOverlayIcon(isVisible);

      const container = document.getElementById('slot-container');
      container.innerHTML = '';
      (config.quickSlots || []).forEach(slot => {
        const btn = document.createElement('div');
        btn.className = 'tw-slot';

        if (slot.iconType === 'text' && slot.textChar) {
          btn.innerHTML = `<span class="tw-slot-text">${slot.textChar}</span>`;
        } else {
          btn.innerHTML = `<i data-lucide="${slot.icon || 'link'}"></i>`;
        }

        if (slot.external) {
          const dot = document.createElement('div');
          dot.className = 'external-dot';
          btn.appendChild(dot);
        }

        btn.onmouseenter = (e) => {
          const rect = btn.getBoundingClientRect();
          tooltip.innerText = slot.label || 'LINK';
          tooltip.style.top = `${rect.top + 4}px`;
          tooltip.style.display = 'flex';
        };
        btn.onmouseleave = () => { tooltip.style.display = 'none'; };

        btn.onclick = () => {
          if (slot.external) window.electronAPI.openExternal(slot.url);
          else window.electronAPI.navigate(slot.url);
        };
        container.appendChild(btn);
      });
      refreshIcons();
    });

    // 갤러리 알림 수신
    window.electronAPI.onGalleryNewActivity(() => {
      document.getElementById('noti-badge').classList.remove('hidden');
    });

    // 업데이트 상태 수신 (사이드바 설정 아이콘에 배지 표시)
    window.electronAPI.onUpdateStatus((data) => {
      const { state } = data;
      const badge = document.getElementById('update-badge');
      if (state === 'available' || state === 'ready') {
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    });

    function toggleZone() {
      const btn = document.getElementById('zone-btn');
      // 클릭 즉시 피드백을 위해 깜빡임만 추가 (실제 상태 변경은 메인 프로세스 응답 시 처리)
      if (!btn.classList.contains('text-green-400') && !btn.classList.contains('text-purple-400')) {
        btn.classList.add('animate-pulse');
      }
      window.electronAPI.toggleMonitorZone();
    }

    function openGallery() {
      document.getElementById('noti-badge').classList.add('hidden');
      window.electronAPI.toggleGallery();
    }

    // ─── 마우스 클릭 통과 지능형 제어 ───
    const wrapper = document.getElementById('wrapper');
    
    // 처음 시작할 때 사이드바 밖(200px 영역)은 클릭 통과 상태로 시작
    window.electronAPI.setIgnoreMouseEvents(true, { forward: true });

    wrapper.addEventListener('mouseenter', () => {
      // 마우스가 사이드바 본체(38px) 안으로 들어오면 클릭 활성화
      window.electronAPI.setIgnoreMouseEvents(false);
    });

    wrapper.addEventListener('mouseleave', () => {
      // 마우스가 사이드바 본체를 벗어나면 다시 클릭 통과 (뒤의 게임 클릭 가능)
      window.electronAPI.setIgnoreMouseEvents(true, { forward: true });
      tooltip.style.display = 'none';
    });

    // ─── 초기화 ───
    refreshIcons();
  </script>
</body>

</html>
