<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>계수 및 명중 계산기</title>
  <link rel="stylesheet" href="style.css">
  <script src="assets/tailwind.min.js"></script>
  <script src="assets/lucide.min.js"></script>
  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      letter-spacing: -0.02em;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .stat-input {
      background-color: rgba(30, 41, 59, 1);
      border: 1px solid rgba(51, 65, 85, 1);
      border-radius: 8px;
      padding: 6px 10px;
      text-align: right;
      color: #818cf8;
      width: 75px;
      font-size: 14px;
      font-weight: 700;
      outline: none;
    }

    .mini-input {
      border-radius: 8px;
      padding: 6px 10px;
      text-align: right;
      font-size: 13px;
      font-weight: 800;
      outline: none;
      border: 1px solid transparent;
      transition: all 0.2s;
      width: 100%;
    }

    .upg-style {
      background-color: rgba(16, 185, 129, 0.08);
      color: #34d399;
      border-color: rgba(16, 185, 129, 0.15);
    }

    .upg-style::placeholder {
      color: rgba(52, 211, 153, 0.4);
      font-size: 11px;
      font-weight: 600;
      text-align: center;
    }

    .abil-style {
      background-color: rgba(168, 85, 247, 0.08);
      color: #a855f7;
      border-color: rgba(168, 85, 247, 0.15);
    }

    .abil-style::placeholder {
      color: rgba(168, 85, 247, 0.4);
      font-size: 11px;
      font-weight: 600;
      text-align: center;
    }

    .gear-select {
      flex: 1;
      background-color: rgba(15, 23, 42, 1);
      border: 1px solid rgba(51, 65, 85, 1);
      border-radius: 8px;
      padding: 8px 12px;
      color: #f1f5f9;
      font-size: 13px;
      font-weight: 600;
      outline: none;
    }

    .tab-btn {
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 800;
      color: #64748b;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn.active {
      color: #818cf8;
      border-bottom-color: #6366f1;
      background-color: rgba(99, 102, 241, 0.05);
    }

    .drag {
      -webkit-app-region: drag;
    }

    .no-drag {
      -webkit-app-region: no-drag;
    }

    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    </style>

    <script>
        window.addEventListener('beforeunload', () => { 
            if (window.electronAPI && window.electronAPI.cleanupAllListeners) {
                window.electronAPI.cleanupAllListeners(); 
            }
        });
    </script>
    </head>

    <body class="bg-slate-950 text-slate-100 select-none h-screen flex flex-col border border-slate-800">

    <!-- Header -->
    <div class="win-header">
    <div class="win-title-area">
      <div class="win-icon-box bg-indigo-500/10 border-indigo-500/20">
        <i data-lucide="calculator" class="w-5 h-5 text-indigo-400"></i>
      </div>
      <div class="win-title-text">
        <span class="win-title-main">계수 및 명중 계산기</span>
        <span class="win-title-sub">Coefficient Calc</span>
      </div>
      <!-- Profile Management -->
      <div class="flex items-center gap-2 no-drag ml-4 bg-slate-800/50 p-1 rounded-xl border border-slate-700/50">
        <select id="profile-select"
          class="bg-slate-900 border border-slate-700 rounded-lg px-2 py-1 text-[11px] font-bold text-slate-200 outline-none focus:border-indigo-500 w-32">
          <option value="default">기본 프로필</option>
        </select>
        <button id="btn-add-profile" class="p-1 hover:bg-indigo-500/20 rounded-lg transition-colors text-indigo-400"
          title="추가">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i>
        </button>
        <button id="btn-rename-profile"
          class="p-1 hover:bg-yellow-500/20 rounded-lg transition-colors text-yellow-400" title="수정">
          <i data-lucide="edit-3" class="w-3.5 h-3.5"></i>
        </button>
        <button id="btn-delete-profile" class="p-1 hover:bg-red-500/20 rounded-lg transition-colors text-red-400"
          title="삭제">
          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    </div>
    <div class="win-controls">
      <button onclick="window.close()" class="win-btn win-close-btn" title="닫기">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
    </div>

    <!-- Tabs -->
    <div class="flex bg-slate-900 px-4 no-drag border-b border-slate-800 shadow-lg relative z-20">
    <button class="tab-btn active" data-type="stab">찌르기</button>
    <button class="tab-btn" data-type="hack">베기</button>
    <button class="tab-btn" data-type="phycomp">물리복합</button>
    <button class="tab-btn" data-type="magatk">마법공격</button>
    <button class="tab-btn" data-type="maghack">마법베기</button>
    <button class="tab-btn" data-type="magdef">마법방어</button>
    </div>

    <!-- Center Content (Dashboard Layout) -->
    <div class="flex-1 overflow-hidden p-6 no-drag bg-slate-950 flex gap-6 max-w-[1500px] mx-auto w-full items-stretch">
      
      <!-- 1단: 좌측 스탯/버프 영역 (W-72 고정, 자체 스크롤) -->
      <div class="w-72 space-y-5 flex-shrink-0 overflow-y-auto custom-scroll pr-1">
        <div class="bg-slate-900/40 p-4 rounded-2xl border border-slate-800 space-y-4">
          <div class="flex items-center justify-between border-b border-slate-800 pb-2">
            <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
              <i data-lucide="zap" class="w-4 h-4 text-purple-400"></i>도핑 프리셋
            </h2>
          </div>
          <div class="space-y-2">
            <select id="buff-preset-select" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs font-bold text-purple-400 outline-none focus:border-purple-500">
              <option value="none">도핑 없음</option>
              <option value="standard">기본 도핑 세트</option>
            </select>
            <div id="active-buff-info" class="text-[10px] font-bold text-slate-500 leading-relaxed pl-1">
              프리셋을 선택하면 스탯에 반영됩니다.
            </div>
          </div>
        </div>

        <div class="bg-slate-900/40 p-4 rounded-2xl border border-slate-800 space-y-4">
          <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 border-b border-slate-800 pb-2 flex items-center gap-2">
            <i data-lucide="user" class="w-4 h-4"></i>기본 스탯
          </h2>
          <div class="space-y-3">
            <div class="flex items-center justify-between"><label class="text-xs font-bold text-slate-500 uppercase">STAB</label><input type="number" id="stat-stab" class="stat-input" value="850"></div>
            <div class="flex items-center justify-between"><label class="text-xs font-bold text-slate-500 uppercase">HACK</label><input type="number" id="stat-hack" class="stat-input" value="550"></div>
            <div class="flex items-center justify-between"><label class="text-xs font-bold text-slate-500 uppercase">INT</label><input type="number" id="stat-int" class="stat-input" value="0"></div>
            <div class="flex items-center justify-between"><label class="text-xs font-bold text-slate-500 uppercase">MR</label><input type="number" id="stat-mr" class="stat-input" value="0"></div>
            <div class="flex items-center justify-between"><label class="text-xs font-black text-yellow-600 uppercase">DEX</label><input type="number" id="stat-dex" class="stat-input !text-yellow-400 !border-yellow-500/20" value="700"></div>
          </div>
        </div>

        <div class="bg-slate-900/40 p-4 rounded-2xl border border-slate-800 space-y-4">
          <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 border-b border-slate-800 pb-2 flex items-center gap-2">
            <i data-lucide="sparkles" class="w-4 h-4"></i>추가 보너스
          </h2>
          <div class="space-y-4">
            <div class="flex text-[9px] font-black text-slate-600 px-1 uppercase mb-1">
              <div class="flex-1 text-left">항목</div>
              <div class="w-12 text-center bonus-label-main">STAB</div>
              <div class="w-12 text-center bonus-label-sub">HACK</div>
              <div class="w-12 text-center text-yellow-600">DEX</div>
            </div>
            <div class="flex items-center gap-1"><span class="text-[11px] text-slate-400 flex-1">아바타</span><input type="number" id="bonus-avatar-main" class="stat-input !w-12 !px-1.5 !text-xs" value="50"><input type="number" id="bonus-avatar-sub" class="stat-input !w-12 !px-1.5 !text-xs !text-slate-500" value="15"><input type="number" id="bonus-avatar-hit" class="stat-input !w-12 !px-1.5 !text-xs !text-yellow-500/70" value="15"></div>
            <div class="flex items-center gap-1"><span class="text-[11px] text-slate-400 flex-1">커프</span><input type="number" id="bonus-cuff-main" class="stat-input !w-12 !px-1.5 !text-xs" value="140"><input type="number" id="bonus-cuff-sub" class="stat-input !w-12 !px-1.5 !text-xs !text-slate-500" value="140"><input type="number" id="bonus-cuff-hit" class="stat-input !w-12 !px-1.5 !text-xs !text-yellow-500/70" value="0"></div>
            <div class="flex items-center gap-1"><span class="text-[11px] text-slate-400 flex-1">효과</span><input type="number" id="bonus-effect-main" class="stat-input !w-12 !px-1.5 !text-xs" value="235"><input type="number" id="bonus-effect-sub" class="stat-input !w-12 !px-1.5 !text-xs !text-slate-500" value="20"><input type="number" id="bonus-effect-hit" class="stat-input !w-12 !px-1.5 !text-xs !text-yellow-500/70" value="0"></div>
            <div class="flex items-center gap-1"><span class="text-[11px] text-slate-400 flex-1">렐릭</span><input type="number" id="bonus-relic-main" class="stat-input !w-12 !px-1.5 !text-xs" value="50"><input type="number" id="bonus-relic-sub" class="stat-input !w-12 !px-1.5 !text-xs !text-slate-500" value="50"><input type="number" id="bonus-relic-hit" class="stat-input !w-12 !px-1.5 !text-xs !text-yellow-500/70" value="0"></div>
            <div class="pt-3 border-t border-slate-800 space-y-2">
              <div class="flex items-center justify-between"><span class="text-[11px] text-slate-400">칭호</span><input type="number" id="bonus-title" class="stat-input !w-24" value="80"></div>
              <div class="flex items-center justify-between"><span class="text-[11px] text-pink-500 font-black">코어</span><input type="number" id="bonus-core" class="stat-input !w-24 !text-pink-400 !border-pink-500/20" value="210"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 우측 영역: 3단 가로 행 구조 (flex-1 flex flex-col gap-4 overflow-hidden) -->
      <div class="flex-1 flex flex-col gap-4 overflow-hidden">
        
        <!-- 1row: 장비 설정 영역 (5열 격자 구조) -->
        <div class="flex flex-col gap-2 flex-shrink-0">
          <div class="flex justify-between items-center px-1">
            <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
              <i data-lucide="shield" class="w-4 h-4 text-indigo-400"></i>장비 설정
            </h2>
            <span class="text-[10px] font-bold text-slate-500 bg-slate-900 px-2 py-0.5 rounded border border-slate-800">
              <span class="text-indigo-400 font-extrabold">M</span>: 주스탯 | 
              <span class="text-emerald-400 font-extrabold">S</span>: 부스탯 | 
              <span class="text-yellow-400 font-extrabold">D</span>: 명중률(DEX)
            </span>
          </div>
          
          <div id="equipment-rows" class="grid grid-cols-5 gap-3">
            <script>
              const parts = [
                { id: 'helm', name: '투구' }, { id: 'armor', name: '갑옷' }, { id: 'weapon', name: '무기' },
                { id: 'wrist', name: '손목' }, { id: 'amulet', name: '머리' }, { id: 'wing', name: '몸' },
                { id: 'gauntlet', name: '손' }, { id: 'boots', name: '다리' }, { id: 'artifact', name: '아티팩트' }
              ];
              parts.forEach(p => {
                const border = p.id === 'weapon' ? 'border-indigo-500/40 bg-indigo-500/5' : 'border-slate-800 bg-slate-900/40';
                document.write(`
                  <div class="p-2.5 rounded-2xl border ${border} space-y-1.5 shadow-sm hover:border-slate-700 transition-colors">
                    <div class="flex items-center justify-between mb-0.5">
                      <span class="text-sm font-black text-slate-300">${p.name}</span>
                      <span id="preview-${p.id}" class="text-[10px] font-bold text-slate-500 tracking-tighter"></span>
                    </div>
                    <select id="gear-${p.id}" class="gear-select w-full py-1.5 px-2 text-sm"></select>
                    <div class="flex items-center gap-1.5">
                      <span class="text-[10px] font-black text-emerald-500 w-8 shrink-0">강화</span>
                      <div class="flex-1 flex gap-1.5">
                        <input type="number" id="upg-${p.id}-main" class="mini-input upg-style py-1 px-1.5 text-sm" placeholder="MAIN">
                        <input type="number" id="upg-${p.id}-sub" class="mini-input upg-style py-1 px-1.5 text-sm" placeholder="SUB">
                      </div>
                    </div>
                    <div class="flex items-center gap-1.5">
                      <span class="text-[10px] font-black text-purple-500 w-8 shrink-0">어빌</span>
                      <div class="flex-1 flex gap-1.5">
                        <input type="number" id="abil-${p.id}-stat" class="mini-input abil-style py-1 px-1.5 text-sm" placeholder="STAT">
                        <input type="number" id="abil-${p.id}-hit" class="mini-input abil-style py-1 px-1.5 text-sm" placeholder="DEX">
                      </div>
                    </div>
                  </div>
                `);
              });
            </script>
          </div>
        </div>

        <!-- 2row: 통계 및 결과 요약 (가로 flex 구조) -->
        <div class="flex gap-5 items-stretch flex-shrink-0 bg-slate-900/40 p-3 rounded-2xl border border-slate-800 shadow-inner">
          
          <!-- 수치 요약 테이블 -->
          <div class="flex-1">
            <table class="w-full font-bold border-separate border-spacing-x-3">
              <thead>
                <tr class="text-[10px] text-slate-500 uppercase tracking-widest">
                  <th class="text-left font-black pb-1">구분</th>
                  <th class="text-right font-black pb-1">기본 스탯</th>
                  <th class="text-right font-black pb-1">장비합</th>
                  <th class="text-right font-black pb-1 text-emerald-500/80">강화</th>
                  <th class="text-right font-black pb-1 text-white/80">최종 합계</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-white/5">
                <tr>
                  <td class="text-indigo-400 text-sm py-1" id="sum-label-main">STAB</td>
                  <td class="text-right text-sm text-slate-400 py-1" id="sum-main-char">0</td>
                  <td class="text-right text-sm text-slate-400 py-1" id="sum-main-gear">0</td>
                  <td class="text-right text-sm text-emerald-400 py-1" id="sum-main-upg">0</td>
                  <td class="text-right text-xl text-white font-black py-1" id="sum-main-total">0</td>
                </tr>
                <tr>
                  <td class="text-slate-300 text-sm py-1" id="sum-label-sub">HACK</td>
                  <td class="text-right text-sm text-slate-400 py-1" id="sum-sub-char">0</td>
                  <td class="text-right text-sm text-slate-400 py-1" id="sum-sub-gear">0</td>
                  <td class="text-right text-sm text-emerald-400 py-1" id="sum-sub-upg">0</td>
                  <td class="text-right text-xl text-slate-200 font-black py-1" id="sum-sub-total">0</td>
                </tr>
                <tr class="border-t border-white/5">
                  <td class="text-yellow-500 text-sm py-1">DEX</td>
                  <td class="text-right text-sm text-slate-400 py-1" id="sum-hit-char">0</td>
                  <td class="text-right text-sm text-slate-400 py-1" id="sum-hit-gear">0</td>
                  <td class="text-right text-sm text-slate-600 py-1">-</td>
                  <td class="text-right text-xl text-yellow-400 font-black py-1" id="sum-hit-total">0</td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- 세로 구분선 -->
          <div class="w-px bg-slate-800/80 my-1"></div>

          <!-- 우측: 결과 카드와 공식 설명 -->
          <div class="w-[450px] flex flex-col justify-between gap-2.5 pl-2">
            <!-- 공식 설명 -->
            <div class="flex items-center justify-between text-[11px] text-slate-500 font-medium">
              <span class="font-black text-slate-400">공식 (호버 시 전체보기):</span>
              <span id="sum-formula" class="text-indigo-400/80 font-bold italic text-right truncate max-w-[280px] cursor-help" title="계수 공식">-</span>
            </div>

            <!-- 계수 & 명중 카드 -->
            <div class="grid grid-cols-2 gap-3 flex-1">
              <div class="bg-indigo-500/5 p-3 rounded-xl border border-indigo-500/20 flex flex-col justify-center">
                <div class="flex items-center gap-1.5 mb-1">
                  <span id="current-series-name" class="text-[9px] font-black text-indigo-400 bg-indigo-500/10 px-1.5 py-0.5 rounded tracking-widest uppercase">찌르기</span>
                  <span class="text-[10px] font-bold text-slate-500">총합 계수</span>
                </div>
                <div id="total-coefficient" class="text-3xl font-black text-white tracking-tighter">0.00</div>
              </div>
              <div class="bg-yellow-500/5 p-3 rounded-xl border border-yellow-500/20 flex flex-col justify-center">
                <div class="flex items-center gap-1.5 mb-1">
                  <i data-lucide="target" class="w-3.5 h-3.5 text-yellow-500"></i>
                  <span class="text-[10px] font-bold text-slate-500">최종 명중(DEX)</span>
                </div>
                <div id="total-hit-display" class="text-3xl font-black text-yellow-400 tracking-tight">0</div>
              </div>
            </div>
          </div>

        </div>

        <!-- 3row: 콘텐츠 가이드 영역 (5열 격자 구조) -->
        <div class="bg-slate-900/40 p-3.5 rounded-2xl border border-slate-800 shadow-xl flex flex-col flex-1 overflow-hidden min-h-[250px]">
          <div class="flex items-center justify-between mb-2.5 border-b border-slate-800 pb-2">
            <h3 class="text-xs font-black text-slate-400 flex items-center gap-1.5">
              <i data-lucide="award" class="w-4 h-4 text-purple-500"></i> 콘텐츠 가이드
            </h3>
            
            <!-- 정보 출처 (인라인 재배치) -->
            <div class="flex items-center gap-3.5 text-[9px] text-slate-500 font-bold">
              <span>정보 출처:</span>
              <button onclick="window.electronAPI.openExternal('https://docs.google.com/spreadsheets/d/1IUy4PgYEX0ov-yLPMR_v87k6fdXtMIEv7CxHabL85wk/edit?gid=0#gid=0')" class="text-slate-400 hover:text-indigo-400 transition-colors flex items-center gap-1">
                <i data-lucide="link" class="w-2.5 h-2.5"></i> 텔쥐 계수계산기
              </button>
              <button onclick="window.electronAPI.openExternal('https://gall.dcinside.com/mini/board/view/?id=talesweaver&no=144536')" class="text-slate-400 hover:text-indigo-400 transition-colors flex items-center gap-1">
                <i data-lucide="link" class="w-2.5 h-2.5"></i> 일텔 공식
              </button>
              <button onclick="window.electronAPI.openExternal('https://gall.dcinside.com/mini/board/view/?id=talesweaver&no=216109&search_head=20&page=1')" class="text-slate-400 hover:text-indigo-400 transition-colors flex items-center gap-1">
                <i data-lucide="link" class="w-2.5 h-2.5"></i> 명중컷 정리
              </button>
            </div>
          </div>
          
          <!-- 5열 격자 콘텐츠 리스트 -->
          <div id="content-guide" class="grid grid-cols-5 gap-3 overflow-y-auto custom-scroll pr-1 flex-1 align-content-start"></div>
        </div>

      </div>
    </div>
    </div>
    <script src="coefficient-calculator-renderer.js"></script>

    <!-- Custom Modal -->
    <div id="modal-overlay"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center hidden no-drag">
    <div class="bg-slate-900 border border-slate-700 w-[400px] rounded-2xl shadow-2xl p-6 space-y-4">
      <h3 id="modal-title" class="text-lg font-black text-white">알림</h3>
      <div id="modal-content" class="space-y-4">
        <p id="modal-message" class="text-sm text-slate-400 font-bold"></p>
        <input type="text" id="modal-input"
          class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm font-bold text-indigo-400 outline-none focus:border-indigo-500 hidden"
          placeholder="내용을 입력하세요">
      </div>
      <div class="flex gap-2 justify-end pt-2">
        <button id="modal-cancel"
