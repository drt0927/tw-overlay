<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <script src="assets/tailwind.min.js"></script>
  <script src="assets/lucide.min.js"></script>
  <script src="assets/ui-utils.js"></script>
  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      letter-spacing: -0.02em;
      margin: 0;
      padding: 0;
      background: #0f121e;
      overflow: hidden;
    }

    .credit-footer {
      height: 28px;
      background: #1a1c2e;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
    }
  </style>
</head>

<body class="panel-glass p-0 h-screen flex flex-col relative text-white select-none">
  <!-- Unified Header (Draggable) -->
  <div class="win-header">
    <div class="win-title-area">
      <div class="win-icon-box bg-rose-500/10 border-rose-500/20">
        <i data-lucide="palette" class="w-5 h-5 text-rose-400"></i>
      </div>
      <div class="win-title-text">
        <span class="win-title-main">제복 색상 시뮬레이터</span>
        <span class="win-title-sub">twsnowflower simulator</span>
      </div>
    </div>
    <div class="win-controls">
      <button onclick="window.close()" class="win-btn win-close-btn" title="닫기">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
  </div>

  <!-- WebContentsView 영역 -->
  <div class="flex-1 bg-[#0f121e]"></div>

  <!-- Credit Footer -->
  <div class="credit-footer no-drag">
    비설화님의 제복 시뮬레이터를 사전 동의 하에 연동하였습니다.
  </div>

  <script>
    if (typeof lucide !== 'undefined') lucide.createIcons();
    if (window.bindEscapeClose) window.bindEscapeClose();
  </script>
</body>

</html>
