<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>시에나의 기운 시뮬레이터</title>
  <link rel="stylesheet" href="style.css">
  <script src="assets/tailwind.min.js"></script>
  <script src="assets/lucide.min.js"></script>
  <script src="assets/ui-utils.js"></script>
</head>
<body class="bg-transparent text-slate-200 font-sans select-none overflow-hidden p-2 h-screen w-screen box-border">
  <div class="panel-glass flex flex-col h-full overflow-hidden shadow-2xl border border-white/10 rounded-2xl">
    
    <!-- Unified Window Header -->
    <div class="win-header shrink-0">
      <div class="win-title-area">
        <div class="win-icon-box bg-purple-500/10 border-purple-500/20">
          <i data-lucide="sparkles" class="w-5 h-5 text-purple-400"></i>
        </div>
        <div class="win-title-text">
          <span class="win-title-main text-purple-100">시에나의 기운 강화</span>
          <span class="win-title-sub text-purple-400/60 font-black">Siena's Aura Simulator</span>
        </div>
        
        <nav class="flex h-10 ml-6 bg-black/40 rounded-xl p-1 border border-white/5" style="-webkit-app-region: no-drag;">
          <button onclick="switchTab('amplify')" id="tab-amplify" class="tab-btn active px-5 rounded-lg text-xs font-black transition-all relative">증폭</button>
          <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn px-5 rounded-lg text-xs font-black transition-all relative">능력치</button>
          <button onclick="switchTab('extra')" id="tab-extra" class="tab-btn px-5 rounded-lg text-xs font-black transition-all relative">추가 옵션</button>
        </nav>
      </div>
      
      <div class="win-controls flex items-center">
        <button onclick="resetSimulator()" id="btn-reset-all" class="px-3 py-1.5 mr-4 bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 rounded-xl flex items-center gap-2 transition-all active:scale-95 text-[11px] font-bold">
          <i data-lucide="rotate-ccw" class="w-3 h-3"></i>
          초기화
        </button>

        <div class="bg-black/40 p-1 rounded-xl flex gap-1 mr-4 border border-white/5" style="-webkit-app-region: no-drag;">
          <button onclick="setEquipType('weapon')" id="btn-weapon" class="px-4 py-1.5 text-[11px] font-black rounded-lg transition-all bg-purple-600 text-white shadow-lg">무기·손목</button>
          <button onclick="setEquipType('armor')" id="btn-armor" class="px-4 py-1.5 text-[11px] font-black rounded-lg transition-all hover:bg-white/5 text-slate-500">방어구</button>
        </div>
        <button onclick="window.electronAPI.toggleSienaAura()" class="win-btn win-close-btn" title="닫기">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>
    </div>

    <!-- 3-Panel Main Area -->
    <div class="flex-1 flex overflow-hidden bg-black/20">
      
      <!-- [Panel 1] Item Status (Fixed Height, No Scroll) -->
      <div class="w-[350px] bg-slate-900/40 border-r border-white/5 flex flex-col p-4 gap-4 overflow-hidden">
        <div class="flex flex-col items-center justify-center py-4 bg-black/20 rounded-2xl border border-white/5 shadow-inner shrink-0">
          <div class="relative group mb-2">
            <div class="absolute -inset-6 bg-purple-500/20 rounded-full blur-3xl group-hover:bg-purple-500/30 transition-all"></div>
            <div class="w-20 h-20 bg-gradient-to-br from-slate-800 to-slate-900 border-2 border-purple-500/40 rounded-3xl flex items-center justify-center relative z-10 shadow-2xl">
              <span id="current-rank" class="text-4xl font-black text-purple-400 drop-shadow-[0_0_10px_rgba(168,85,247,0.5)]">0</span>
            </div>
          </div>
          <span class="text-xs font-black text-slate-400 tracking-widest uppercase">현재 강화 단계</span>
        </div>
        
        <div class="flex flex-col gap-2 flex-1 min-h-0 overflow-hidden">
          <div class="flex items-center justify-between px-1">
            <div class="flex items-center gap-2">
              <i data-lucide="layers" class="w-3.5 h-3.5 text-slate-500"></i>
              <span class="text-xs font-black text-slate-400 uppercase tracking-wider">부여된 능력치</span>
            </div>
            <span class="text-[11px] text-slate-600 font-mono font-bold" id="stat-count">0 / 10</span>
          </div>
          <div id="stat-slots" class="flex flex-col gap-1 bg-black/10 p-1 rounded-2xl border border-white/5 flex-1 overflow-hidden"></div>
        </div>

        <div class="flex flex-col gap-2 shrink-0 overflow-hidden">
          <div class="flex items-center justify-between px-1">
            <div class="flex items-center gap-2">
              <i data-lucide="sparkles" class="w-3.5 h-3.5 text-slate-500"></i>
              <span class="text-xs font-black text-slate-400 uppercase tracking-wider">추가 옵션</span>
            </div>
            <span class="text-[11px] text-slate-600 font-mono font-bold" id="extra-count">0 / 3</span>
          </div>
          <div id="extra-slots" class="flex flex-col gap-1 bg-black/10 p-1.5 rounded-2xl border border-white/5"></div>
        </div>
      </div>

      <!-- [Panel 2] Action Area (Optimized Layout) -->
      <div class="flex-1 flex flex-col relative bg-black/5 p-3 gap-3 overflow-hidden">
        
        <!-- NPC Background -->
        <div class="absolute bottom-4 right-6 opacity-[0.02] pointer-events-none transition-all duration-1000">
          <img src="assets/img/siena/힌덴.png" alt="NPC" class="w-48 filter drop-shadow-[0_0_30px_rgba(168,85,247,0.3)]">
        </div>
        
        <!-- [Upper Area: Compact Actions] -->
        <div class="shrink-0 flex flex-col gap-3">
          
          <!-- Tab 1: Amplify -->
          <div id="view-amplify" class="tab-view active">
            <div class="bg-slate-800/30 border border-white/10 rounded-2xl p-4 flex items-center justify-between shadow-xl backdrop-blur-md">
              <div class="flex items-center gap-4">
                <div class="flex flex-col w-[100px]">
                  <div class="flex items-center gap-1.5">
                    <i data-lucide="zap" class="w-3.5 h-3.5 text-amber-400"></i>
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">성공 확률</span>
                  </div>
                  <span id="success-rate" class="text-3xl font-black text-purple-400 tracking-tighter mt-0.5">100%</span>
                </div>
                <div class="h-8 w-px bg-white/10"></div>
                <div class="flex flex-col gap-1.5">
                  <span class="text-[10px] font-black text-slate-500 uppercase">자동 강화 목표</span>
                  <select id="target-rank" onchange="updateUI()" class="bg-slate-900 border border-slate-700 text-xs font-bold rounded-lg px-2 py-1 text-slate-100 focus:outline-none focus:border-purple-500 min-w-[80px]">
                    <option value="1">1단계</option>
                    <option value="2">2단계</option>
                    <option value="3">3단계</option>
                    <option value="4">4단계</option>
                    <option value="5">5단계</option>
                    <option value="6">6단계</option>
                    <option value="7">7단계</option>
                    <option value="8">8단계</option>
                    <option value="9">9단계</option>
                    <option value="10" selected>10단계</option>
                  </select>
                </div>
              </div>
              <div class="flex flex-col gap-2 w-[120px]">
                <button onclick="amplifyStep()" id="btn-amplify" class="w-full py-1.5 bg-gradient-to-r from-purple-700 to-purple-600 hover:from-purple-600 hover:to-purple-500 text-white font-black rounded-lg transition-all shadow-lg active:scale-95 text-xs uppercase tracking-widest">증폭 시도</button>
                <button onclick="autoAmplify()" id="btn-auto-amplify" class="w-full py-1.5 bg-slate-700 hover:bg-slate-600 text-white font-black rounded-lg transition-all shadow-lg active:scale-95 text-xs uppercase tracking-widest border border-white/5">자동 시작</button>
              </div>
            </div>
          </div>

          <!-- Tab 2: Stats Reset -->
          <div id="view-stats" class="tab-view hidden">
            <div class="bg-slate-800/30 border border-white/10 rounded-2xl p-4 flex items-center justify-between shadow-xl backdrop-blur-md">
              <div class="flex items-center gap-4">
                <div class="flex items-center gap-3 w-[90px]">
                  <img src="assets/img/siena/에이라의망치.png" class="w-8 h-8">
                  <div class="flex flex-col">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">잠금</span>
                    <span id="lock-count-display" class="text-lg font-black text-amber-400 tracking-tighter mt-0.5">0 / 9</span>
                  </div>
                </div>
                <div class="h-8 w-px bg-white/10"></div>
                <div class="flex flex-col gap-1.5">
                  <span class="text-[10px] font-black text-slate-500 uppercase">자동 설정 목표</span>
                  <div class="flex gap-1.5">
                    <select id="auto-stat-name" class="bg-slate-900 border border-slate-700 text-[10px] font-bold rounded-lg px-2 py-1 text-slate-100 focus:outline-none focus:border-purple-500 max-w-[95px]">
                      <!-- JS handles options -->
                    </select>
                    <select id="auto-stat-grade" class="bg-slate-900 border border-slate-700 text-[10px] font-bold rounded-lg px-2 py-1 text-slate-100 focus:outline-none focus:border-purple-500 w-[65px]">
                      <option value="하">하 이상</option>
                      <option value="중">중 이상</option>
                      <option value="상">상</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="flex flex-col gap-2 w-[120px]">
                <button onclick="resetStats()" id="btn-reset-stats" class="w-full py-1.5 bg-gradient-to-r from-emerald-700 to-emerald-600 hover:from-emerald-600 hover:to-emerald-500 text-white font-black rounded-lg transition-all shadow-lg active:scale-95 text-xs uppercase tracking-widest">재설정 시도</button>
                <button onclick="autoResetStats()" id="btn-auto-reset-stats" class="w-full py-1.5 bg-slate-700 hover:bg-slate-600 text-white font-black rounded-lg transition-all shadow-lg active:scale-95 text-xs uppercase tracking-widest border border-white/5">자동 시작</button>
              </div>
            </div>
          </div>

          <!-- Tab 3: Extra Options Reset -->
          <div id="view-extra" class="tab-view hidden">
            <div class="bg-slate-800/30 border border-white/10 rounded-2xl p-4 flex items-center justify-between shadow-xl backdrop-blur-md">
              <div class="flex items-center gap-4">
                <div class="flex flex-col gap-1.5 w-[90px]">
                  <label class="cursor-pointer group">
                    <input type="radio" name="item-type" value="all" checked class="hidden peer" onchange="updateUI()">
                    <div class="flex items-center gap-2 px-2.5 py-1.5 rounded-lg border border-slate-700 bg-slate-900/50 group-hover:border-slate-500 peer-checked:border-purple-500 peer-checked:bg-purple-500/10 transition-all">
                      <img src="assets/img/siena/환류의서.gif" class="w-4 h-4">
                      <span class="text-[10px] font-black text-slate-100">환류의 서</span>
                    </div>
                  </label>
                  <label class="cursor-pointer group">
                    <input type="radio" name="item-type" value="single" class="hidden peer" onchange="updateUI()">
                    <div class="flex items-center gap-2 px-2.5 py-1.5 rounded-lg border border-slate-700 bg-slate-900/50 group-hover:border-slate-500 peer-checked:border-purple-500 peer-checked:bg-purple-500/10 transition-all">
                      <img src="assets/img/siena/정환의서.gif" class="w-4 h-4">
                      <span class="text-[10px] font-black text-slate-100">정환의 서</span>
                    </div>
                  </label>
                </div>
                <div class="h-10 w-px bg-white/10"></div>
                <div class="flex flex-col gap-1.5">
                  <span class="text-[10px] font-black text-slate-500 uppercase">자동 설정 목표</span>
                  <div class="flex gap-1.5">
                    <select id="auto-extra-name" class="bg-slate-900 border border-slate-700 text-[10px] font-bold rounded-lg px-2 py-1 text-slate-100 focus:outline-none focus:border-purple-500 max-w-[95px]">
                      <!-- JS handles options -->
                    </select>
                    <select id="auto-extra-grade" class="bg-slate-900 border border-slate-700 text-[10px] font-bold rounded-lg px-2 py-1 text-slate-100 focus:outline-none focus:border-purple-500 w-[65px]">
                      <option value="하">하 이상</option>
                      <option value="중">중 이상</option>
                      <option value="상">상</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="flex flex-col gap-2 w-[120px]">
                <button onclick="resetExtraOptions()" id="btn-reset-extra" class="w-full py-1.5 bg-gradient-to-r from-indigo-700 to-indigo-600 hover:from-indigo-600 hover:to-indigo-500 text-white font-black rounded-lg transition-all shadow-lg active:scale-95 text-xs uppercase tracking-widest">추옵 재설정</button>
                <button onclick="autoResetExtraOptions()" id="btn-auto-reset-extra" class="w-full py-1.5 bg-slate-700 hover:bg-slate-600 text-white font-black rounded-lg transition-all shadow-lg active:scale-95 text-xs uppercase tracking-widest border border-white/5">자동 시작</button>
              </div>
            </div>
          </div>
        </div>

        <!-- [Lower Area: Stats Dashboard] -->
        <div class="flex-1 flex flex-col gap-3 bg-black/40 p-4 rounded-3xl border border-white/10 shadow-2xl relative overflow-hidden">
          
          <!-- Dashboard Header -->
          <div class="flex items-center justify-between shrink-0 mb-1">
            <div class="flex items-center gap-2.5">
              <div class="p-1.5 bg-amber-500/10 rounded-lg"><i data-lucide="layout-dashboard" class="w-4 h-4 text-amber-400"></i></div>
              <span class="text-xs font-black text-slate-400 uppercase tracking-widest">실시간 강화 대시보드</span>
            </div>
            <div class="flex bg-black/50 p-0.5 rounded-lg border border-white/5 shrink-0" style="-webkit-app-region: no-drag;">
              <button onclick="setCurrency('seed')" id="cur-seed" class="px-4 py-1 text-[10px] font-black rounded transition-all bg-emerald-600 text-white">SEED</button>
              <button onclick="setCurrency('elso')" id="cur-elso" class="px-4 py-1 text-[10px] font-black rounded transition-all hover:bg-white/5 text-slate-500">ELSO</button>
            </div>
          </div>

          <!-- Current Action Cost -->
          <div id="current-action-cost" class="shrink-0"></div>

          <!-- Cumulative Data (Slim Rows) -->
          <div class="flex-1 border-t border-white/5 pt-3 flex flex-col gap-2 min-h-0">
            <div class="flex items-center gap-2 px-1 mb-1">
              <i data-lucide="bar-chart-3" class="w-3.5 h-3.5 text-slate-600"></i>
              <span class="text-[10px] font-black text-slate-600 uppercase tracking-widest">누적 통계</span>
            </div>
            
            <div class="flex flex-col gap-2 flex-1 overflow-y-auto custom-scroll p-1 mr-[-4px] pr-[4px]">
              
              <!-- 누적 재화 (Categorized) -->
              <div class="flex flex-col bg-black/30 p-3 rounded-2xl border border-white/5 gap-3 transition-all hover:bg-black/50">
                <div class="flex items-center gap-3">
                  <i data-lucide="coins" class="w-4 h-4 text-emerald-500"></i>
                  <span class="text-xs font-black text-slate-500 uppercase tracking-widest">누적 소비 재화 내역</span>
                </div>
                <div id="total-wealth-container">
                  <!-- JS handles categorizing -->
                </div>
              </div>


              <!-- 강화 재료 상세 (Compact 2-Row) -->
              <div class="flex flex-col bg-black/30 p-3 rounded-2xl border border-white/5 gap-3 transition-all hover:bg-black/50">
                <div class="flex items-center gap-3">
                  <i data-lucide="package" class="w-4 h-4 text-blue-500"></i>
                  <span class="text-xs font-black text-slate-500 uppercase tracking-widest">강화 아이템 상세</span>
                </div>
                <div class="flex flex-col gap-1.5">
                  <!-- Row 1: 힌덴, 장인 (2 Cols) -->
                  <div class="grid grid-cols-2 gap-1.5">
                    <div class="flex items-center justify-between px-3 py-1.5 bg-black/40 rounded-xl border border-white/5">
                      <span class="text-[10px] text-slate-600 font-black uppercase">힌덴의 가루</span>
                      <span id="mat-powder" class="text-[13px] font-black text-slate-200">0</span>
                    </div>
                    <div class="flex items-center justify-between px-3 py-1.5 bg-black/40 rounded-xl border border-white/5">
                      <span class="text-[10px] text-slate-600 font-black uppercase">장인의 혼</span>
                      <span id="mat-soul" class="text-[13px] font-black text-slate-200">0</span>
                    </div>
                  </div>
                  <!-- Row 2: 망치, 환류, 정환 (3 Cols) -->
                  <div class="grid grid-cols-3 gap-1.5">
                    <div class="flex flex-col items-center py-1.5 bg-black/40 rounded-xl border border-white/5">
                      <span class="text-[10px] text-slate-600 font-black uppercase mb-0.5">에이라의 망치</span>
                      <span id="mat-hammer" class="text-sm font-black text-slate-200">0</span>
                    </div>
                    <div class="flex flex-col items-center py-1.5 bg-black/40 rounded-xl border border-white/5">
                      <span class="text-[10px] text-slate-600 font-black uppercase mb-0.5">환류의 서</span>
                      <span id="mat-all" class="text-sm font-black text-slate-200">0</span>
                    </div>
                    <div class="flex flex-col items-center py-1.5 bg-black/40 rounded-xl border border-white/5">
                      <span class="text-[10px] text-slate-600 font-black uppercase mb-0.5">정환의 서</span>
                      <span id="mat-single" class="text-sm font-black text-slate-200">0</span>
                    </div>
                  </div>
                </div>
              </div>

              <!-- 실행 카운트 (Compact 1-Row 3-Cols) -->
              <div class="flex flex-col bg-black/30 p-3 rounded-2xl border border-white/5 gap-3 transition-all hover:bg-black/50">
                <div class="flex items-center gap-3">
                  <i data-lucide="refresh-cw" class="w-4 h-4 text-purple-500"></i>
                  <span class="text-xs font-black text-slate-500 uppercase tracking-widest">강화 시도 횟수</span>
                </div>
                <div class="grid grid-cols-3 gap-2 bg-black/20 p-2 rounded-xl border border-white/5">
                  <div class="flex flex-col items-center">
                    <span class="text-[10px] text-slate-600 font-black uppercase mb-0.5">증폭 시도</span>
                    <span id="cnt-amplify" class="text-[15px] font-black text-purple-400">0</span>
                  </div>
                  <div class="flex flex-col items-center border-x border-white/5">
                    <span class="text-[10px] text-slate-600 font-black uppercase mb-0.5">능력치 재설정</span>
                    <span id="cnt-stats" class="text-[15px] font-black text-emerald-400">0</span>
                  </div>
                  <div class="flex flex-col items-center">
                    <span class="text-[10px] text-slate-600 font-black uppercase mb-0.5">추옵 변경</span>
                    <span id="cnt-extra" class="text-[15px] font-black text-indigo-400">0</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- [Panel 3] History Log (Persistent) -->
      <div class="w-[320px] bg-black/30 border-l border-white/5 flex flex-col shrink-0 overflow-hidden">
        <div class="px-6 py-4 flex items-center justify-between bg-black/20 border-b border-white/5 shrink-0">
          <div class="flex items-center gap-2.5">
            <i data-lucide="list-todo" class="w-4 h-4 text-slate-500"></i>
            <span class="text-xs font-black text-slate-400 uppercase tracking-widest">실시간 히스토리</span>
          </div>
        </div>
        
        <div class="flex-1 overflow-y-auto custom-scroll p-4 flex flex-col gap-1 min-h-0">
          <div id="history-log" class="flex flex-col gap-1">
            <div class="text-xs text-slate-600 italic text-center mt-20 font-medium tracking-tight">내역이 없습니다.</div>
          </div>
        </div>

        <!-- Math Expectation -->
        <div class="p-6 bg-purple-500/5 border-t border-purple-500/10 shrink-0">
          <div class="flex items-center gap-3 mb-4">
            <div class="p-1.5 bg-purple-500/20 rounded-lg"><i data-lucide="calculator" class="w-4 h-4 text-purple-400"></i></div>
            <span class="text-[11px] font-black text-purple-200 uppercase tracking-widest">증폭 기댓값</span>
          </div>
          <div id="expectation-view" class="flex flex-col gap-2.5"></div>
        </div>
      </div>

    </div>
  </div>

  <style>
    .tab-btn.active { background: rgba(168, 85, 247, 0.2); color: #f8fafc; border: 1px solid rgba(168, 85, 247, 0.3); }
    .tab-btn:not(.active) { color: #64748b; }
    .tab-btn:not(.active):hover { color: #94a3b8; background: rgba(255, 255, 255, 0.05); }

    .custom-scroll::-webkit-scrollbar { width: 3px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.4); }

    .stat-row { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.03); }
    .stat-row.locked-stat { border-color: rgba(245, 158, 11, 0.3); background: rgba(245, 158, 11, 0.05); }

    .extra-row { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    .extra-row.selected { border-color: #a855f7; background: rgba(168, 85, 247, 0.05); }

    @keyframes success-pulse {
      0% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.02); filter: brightness(1.4) drop-shadow(0 0 10px rgba(168, 85, 247, 0.4)); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    .animate-success { animation: success-pulse 0.4s ease-out; }

    @keyframes fail-shake {
      0%, 100% { transform: translateX(0); }
      20%, 40%, 60%, 80% { transform: translateX(3px); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
    }
    .animate-fail { animation: fail-shake 0.3s ease-in-out; }
    
    select option { background: #0f121e; color: white; }
