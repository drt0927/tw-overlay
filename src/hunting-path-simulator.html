<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>사냥터 동선 시뮬레이션</title>
  <link class="no-drag" rel="stylesheet" href="style.css">
  <script src="assets/tailwind.min.js"></script>
  <script src="assets/lucide.min.js"></script>
  <script src="assets/ui-utils.js"></script>
  <style>
    body {
      background: transparent;
      color: var(--text-main);
      overflow: hidden;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
    }

    .no-drag {
      -webkit-app-region: no-drag;
    }

    /* 탭 버튼 스타일: siena-aura.html 패턴 차용 (에메랄드 톤 매핑) */
    .tab-btn {
      color: #64748b;
      font-size: 12px;
      font-weight: 900;
      padding: 0 20px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab-btn:hover {
      color: #94a3b8;
      background: rgba(255, 255, 255, 0.05);
    }

    .tab-btn.active {
      background: rgba(52, 211, 153, 0.2);
      color: #f8fafc;
      border: 1px solid rgba(52, 211, 153, 0.3);
      box-shadow: 0 4px 12px rgba(52, 211, 153, 0.15);
    }

    .tab-btn:active {
      transform: scale(0.95);
    }

    /* 캔버스 영역 */
    .canvas-area {
      position: relative;
      background: #070913;
      padding: 8px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      align-self: center;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
    }

    .map-container {
      position: relative;
      width: 828px;
      height: 496px;
      cursor: crosshair;
      overflow: hidden;
      border-radius: 12px;
    }

    img.map {
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.8;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    svg.overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: all;
    }

    :root {
      --path-color: #34d399;
    }

    /* SVG 노드 및 경로 렌더링 */
    .path-line {
      fill: none;
      stroke: var(--path-color);
      stroke-width: 3.5;
      pointer-events: none;
    }

    .path-hitbox {
      fill: none;
      stroke: transparent;
      stroke-width: 15;
      cursor: copy;
      pointer-events: all;
    }

    .path-hitbox:hover {
      stroke: var(--path-color);
      opacity: 0.15;
    }

    .node-hitbox {
      fill: transparent;
      cursor: grab;
      pointer-events: all;
    }

    .node {
      fill: var(--path-color);
      stroke: #000000;
      stroke-width: 1.5;
      pointer-events: none;
      transition: r 0.15s, fill 0.15s, stroke-width 0.15s;
    }

    .node-hitbox:hover + .node {
      fill: #ffffff;
      r: 11;
      stroke-width: 2.5;
    }

    .node.active {
      fill: #f87171 !important; /* Red 400 */
      r: 11.5 !important;
      stroke: #ffffff !important;
    }

    .node.start {
      fill: #facc15; /* Yellow 400 */
      r: 8;
    }

    .node.end {
      fill: #f87171; /* Red 400 */
      r: 8;
    }

    .node-text {
      font-size: 9px;
      font-weight: 900;
      fill: #0f172a; /* 어두운 색상으로 밝은 노드 배경 위에 글씨 가독성 확보 */
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
      user-select: none;
    }

    /* 단축키 정보 배너: boss-settings.html 가이드 배너 스타일 반영 */
    .guide-banner {
      background: rgba(30, 41, 59, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      width: 100%;
      max-width: 844px;
      align-self: center;
    }

    /* 오버레이 모드 레이아웃 오버라이드 */
    body.overlay-mode {
      background: transparent !important;
      box-shadow: none !important;
      border: none !important;
    }
    body.overlay-mode .win-header {
      display: none !important;
    }
    body.overlay-mode .flex-1 {
      padding: 0 !important;
      gap: 0 !important;
      justify-content: center;
      align-items: center;
    }
    body.overlay-mode .canvas-area {
      padding: 0 !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      background: transparent !important;
    }
    body.overlay-mode .guide-banner,
    body.overlay-mode .panel-glass:not(#overlayControlPanel) {
      display: none !important;
    }
    body.overlay-mode .node,
    body.overlay-mode .node-text,
    body.overlay-mode .node-hitbox {
      display: none !important;
    }
    #overlayControlPanel .drag-header {
      cursor: move;
      user-select: none;
    }
  </style>
</head>
<body class="panel-glass p-0 h-screen flex flex-col">
  <!-- Unified Window Header (Header 탭 내장 방식 동기화) -->
  <div class="win-header shrink-0">
    <div class="win-title-area">
      <div class="win-icon-box bg-emerald-500/10 border-emerald-500/20">
        <i data-lucide="map" class="w-5 h-5 text-emerald-400"></i>
      </div>
      <div class="win-title-text">
        <span class="win-title-main text-emerald-100">사냥터 동선 시뮬레이션</span>
        <span class="win-title-sub text-emerald-400/60 font-black">Hunting Path Simulator</span>
      </div>
      
      <!-- siena-aura.html 방식의 헤더 내 탭 바 연동 -->
      <nav class="flex h-10 ml-6 bg-black/40 rounded-xl p-1 border border-white/5" id="tabsContainer" style="-webkit-app-region: no-drag;">
        <!-- 동적 탭 구성 영역 -->
      </nav>
    </div>
    
    <div class="win-controls">
      <button onclick="window.electronAPI.toggleHuntingPathSimulator()" class="win-btn win-close-btn" title="닫기">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>
    </div>
  </div>

  <!-- 본문 컨텐츠 영역 -->
  <div class="flex-1 overflow-hidden flex flex-col no-drag p-1 space-y-4">
    <!-- 맵 캔버스 영역 -->
    <div class="canvas-area">
      <div class="map-container" id="mapContainer">
        <img id="mapImage" src="" class="map">
        <svg class="overlay" id="svgOverlay"></svg>
      </div>
    </div>

    <!-- 동선 옵션 컨트롤러 -->
    <div class="panel-glass rounded-xl p-3 flex items-center justify-between text-xs border border-white/5 bg-slate-900/40 shrink-0 max-w-[828px] w-full self-center">
      <div class="flex items-center gap-6">
        <!-- 선 색상 선택 -->
        <div class="flex items-center gap-2.5">
          <span class="text-slate-400 font-bold flex items-center gap-1">
            <i data-lucide="palette" class="w-3.5 h-3.5 text-slate-400"></i>
            선 색상
          </span>
          <div class="flex items-center gap-2" id="colorPresetContainer">
            <button onclick="setPathColor('#34d399')" class="preset-btn w-6 h-6 rounded-full border border-white/10 transition-all hover:scale-110 active:scale-95" style="background-color: #34d399;" title="초록"></button>
            <button onclick="setPathColor('#f87171')" class="preset-btn w-6 h-6 rounded-full border border-white/10 transition-all hover:scale-110 active:scale-95" style="background-color: #f87171;" title="빨강"></button>
            <button onclick="setPathColor('#60a5fa')" class="preset-btn w-6 h-6 rounded-full border border-white/10 transition-all hover:scale-110 active:scale-95" style="background-color: #60a5fa;" title="파랑"></button>
            <button onclick="setPathColor('#facc15')" class="preset-btn w-6 h-6 rounded-full border border-white/10 transition-all hover:scale-110 active:scale-95" style="background-color: #facc15;" title="노랑"></button>
            <button onclick="setPathColor('#c084fc')" class="preset-btn w-6 h-6 rounded-full border border-white/10 transition-all hover:scale-110 active:scale-95" style="background-color: #c084fc;" title="보라"></button>
            <!-- 커스텀 컬러 피커 -->
            <div class="relative w-6 h-6 flex items-center justify-center rounded-full bg-black/40 border border-white/10 ml-1 overflow-hidden transition-all hover:scale-105 active:scale-95">
              <input type="color" id="pathColorPicker" oninput="setPathColor(this.value)" class="absolute opacity-0 cursor-pointer w-full h-full">
              <i data-lucide="plus" class="w-4 h-4 text-slate-400 pointer-events-none"></i>
            </div>
          </div>
        </div>

        <div class="h-4 w-px bg-white/10"></div>

        <!-- 진행 방향 화살표 토글 -->
        <label class="flex items-center gap-2 cursor-pointer select-none text-slate-400 hover:text-slate-200 transition-colors">
          <input type="checkbox" id="toggleArrows" onchange="setArrowsEnabled(this.checked)" class="w-3.5 h-3.5 accent-emerald-500 rounded border-white/10 bg-black/30 cursor-pointer">
          <span class="font-bold flex items-center gap-1">
            <i data-lucide="move-right" class="w-3.5 h-3.5"></i>
            진행 방향 표시
          </span>
        </label>

        <div class="h-4 w-px bg-white/10"></div>

        <!-- 시작-끝 연결 토글 -->
        <label class="flex items-center gap-2 cursor-pointer select-none text-slate-400 hover:text-slate-200 transition-colors">
          <input type="checkbox" id="toggleLoop" onchange="setLoopEnabled(this.checked)" class="w-3.5 h-3.5 accent-emerald-500 rounded border-white/10 bg-black/30 cursor-pointer">
          <span class="font-bold flex items-center gap-1">
            <i data-lucide="infinity" class="w-3.5 h-3.5"></i>
            시작-끝 연결
          </span>
        </label>
      </div>

      <!-- 우측 끝: 오버레이 버튼 -->
      <div class="flex items-center gap-3">
        <button onclick="enableOverlayMode()" class="px-2.5 py-1.5 rounded-lg bg-emerald-500/10 hover:bg-emerald-500/20 border border-emerald-500/20 hover:border-emerald-500/40 text-emerald-400 text-[11px] font-black transition-all flex items-center gap-1 no-drag">
          <i data-lucide="app-window" class="w-3.5 h-3.5"></i>
          오버레이 모드
        </button>
      </div>
    </div>

    <!-- 하단 단축키 가이드 배너 -->
    <div class="guide-banner shrink-0">
      <div class="w-8 h-8 rounded-lg bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center shrink-0">
        <i data-lucide="info" class="w-4 h-4 text-emerald-400"></i>
      </div>
      <div class="flex-1">
        <h4 class="text-xs font-bold text-slate-300 mb-1">[단축키 안내]</h4>
        <p class="text-[11px] text-slate-500 leading-relaxed">
          노드 중간 삽입: 맵 위 <strong>경로 선</strong>을 <strong>Ctrl + 클릭</strong><br/>
          노드 끝에 추가: 맵의 <strong>빈 공간</strong>을 <strong>Ctrl + 클릭</strong><br/>
          노드 삭제: 맵 위 노드 <strong>마우스 우클릭</strong><br/>
          선 색상 변경: 맵 위 <strong>경로 선</strong>을 <strong>마우스 우클릭</strong>
        </p>
      </div>
      <!-- 동선 초기화 버튼 -->
      <div class="shrink-0 flex items-center justify-center ml-4">
        <button onclick="clearCurrentPath()" class="px-3 py-2 rounded-xl bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 hover:border-red-500/40 text-red-400 text-[11px] font-black transition-all flex items-center gap-1.5 no-drag">
          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
          동선 초기화
        </button>
      </div>
    </div>
  </div>

  <script>
    // 맵 데이터 및 상태 (DB 비동기 바인딩을 위해 빈 객체 선언)
    let mapsConfig = {};
    let activePoints = {};
    let currentTab = "";

    // 신규 추가 설정 변수
    let pathColor = localStorage.getItem('hps-path-color') || '#34d399';
    let isArrowsEnabled = localStorage.getItem('hps-arrows-enabled') === 'true';
    let isLoopEnabled = localStorage.getItem('hps-loop-enabled') === 'true';

    // 오버레이 및 크기 스케일 변수
    let currentScale = 1.0; // 평소 일반 모드에서는 1.0 고정
    let currentOpacity = 0.8; // 평소 일반 모드에서는 0.8 고정
    let isOverlayMode = false;

    const mapContainer = document.getElementById('mapContainer');
    const mapImage = document.getElementById('mapImage');
    const svg = document.getElementById('svgOverlay');
    const tabsContainer = document.getElementById('tabsContainer');
    
    let draggingIdx = -1;
    let dragOffset = { x: 0, y: 0 };

    // 탭 구성 생성
    function initTabs() {
      tabsContainer.innerHTML = '';
      Object.keys(mapsConfig).forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (key === currentTab ? ' active' : '');
        btn.innerText = mapsConfig[key].name;
        btn.onclick = () => switchTab(key);
        tabsContainer.appendChild(btn);
      });
    }

    // 탭 전환
    function switchTab(tabKey) {
      if (currentTab === tabKey) return;
      currentTab = tabKey;
      
      // active 클래스 갱신
      const btns = tabsContainer.querySelectorAll('.tab-btn');
      Object.keys(mapsConfig).forEach((key, idx) => {
        if (key === currentTab) btns[idx].classList.add('active');
        else btns[idx].classList.remove('active');
      });

      draggingIdx = -1;
      render();
    }

    // 게임 좌표 -> 픽셀 좌표 변환
    function gameToPixel(gx, gy) {
      const cfg = mapsConfig[currentTab];
      let x = gx * cfg.fX;
      let y = gy * cfg.fY;
      if (cfg.isSwap) [x, y] = [y, x];
      const px = ((x - y) * cfg.S + cfg.Ox) * currentScale;
      const py = ((x + y) * (cfg.S / 2) + cfg.Oy) * currentScale;
      return { x: px, y: py };
    }

    // 픽셀 좌표 -> 게임 좌표 변환
    function pixelToGame(px, py) {
      const cfg = mapsConfig[currentTab];
      const sx = px / currentScale;
      const sy = py / currentScale;
      const x = (sx - cfg.Ox) / (2 * cfg.S) + (sy - cfg.Oy) / cfg.S;
      const y = (sy - cfg.Oy) / cfg.S - (sx - cfg.Ox) / (2 * cfg.S);
      let gx, gy;
      if (cfg.isSwap) {
        gy = x / cfg.fY;
        gx = y / cfg.fX;
      } else {
        gx = x / cfg.fX;
        gy = y / cfg.fY;
      }
      return [Math.round(gx), Math.round(gy)];
    }

    // 개별 세그먼트 색상 제어 변수 및 팝업 제어
    let selectedSegmentIdx = -1;

    function showSegmentColorPopup(x, y, segmentIdx) {
      const popup = document.getElementById('segmentColorPopup');
      if (!popup) return;
      selectedSegmentIdx = segmentIdx;
      
      // 크기 측정을 위해 화면에 먼저 노출시킴
      popup.classList.remove('hidden');

      const popupWidth = popup.offsetWidth;
      const popupHeight = popup.offsetHeight;
      const windowWidth = window.innerWidth;
      const windowHeight = window.innerHeight;

      // 화면 가장자리 이탈 방지 보정 (12px의 세이프 여백 확보)
      let left = x;
      let top = y;

      if (x + popupWidth > windowWidth) {
        left = windowWidth - popupWidth - 12;
      }
      if (y + popupHeight > windowHeight) {
        top = windowHeight - popupHeight - 12;
      }

      // 최소 좌표값(12) 방어
      left = Math.max(12, left);
      top = Math.max(12, top);

      popup.style.left = `${left}px`;
      popup.style.top = `${top}px`;

      // 기존 색상을 미니 컬러 피커 인풋에 동기화
      const points = activePoints[currentTab];
      const picker = document.getElementById('segmentColorPicker');
      if (picker && points && points[segmentIdx]) {
        picker.value = points[segmentIdx][2] || pathColor;
      }
    }

    function hideSegmentColorPopup() {
      const popup = document.getElementById('segmentColorPopup');
      if (popup) popup.classList.add('hidden');
      selectedSegmentIdx = -1;
    }

    function changeSelectedSegmentColor(color, shouldClosePopup = true) {
      if (selectedSegmentIdx === -1) return;
      const points = activePoints[currentTab];
      if (points && points[selectedSegmentIdx]) {
        // [gx, gy, color] 로 색상 정보 업데이트
        points[selectedSegmentIdx][2] = color;
        render();
        window.electronAPI.saveHuntingPath(currentTab, points);
      }
      
      if (shouldClosePopup) {
        hideSegmentColorPopup();
      } else {
        // 팝업은 닫지 않지만 미니 컬러 피커 인풋에 현재 바뀐 색상을 세팅
        const picker = document.getElementById('segmentColorPicker');
        if (picker) picker.value = color;
      }
    }

    // 마우스 클릭 시 팝업 영역 밖이면 닫기
    window.addEventListener('mousedown', (e) => {
      const popup = document.getElementById('segmentColorPopup');
      if (popup && !popup.contains(e.target)) {
        // 즉시 닫지 않고 0ms 지연하여 닫아 버튼의 mousedown 이벤트 소실 방지
        setTimeout(() => {
          hideSegmentColorPopup();
        }, 0);
      }
    });

    // 색상 설정 및 반영 (글로벌 기본 색상 변경)
    function setPathColor(color) {
      pathColor = color;
      localStorage.setItem('hps-path-color', color);
      document.documentElement.style.setProperty('--path-color', color);
      
      const presets = document.querySelectorAll('.preset-btn');
      presets.forEach(btn => {
        if (bgToHex(btn.style.backgroundColor) === color.toLowerCase()) {
          btn.classList.add('ring-2', 'ring-white', 'scale-110');
        } else {
          btn.classList.remove('ring-2', 'ring-white', 'scale-110');
        }
      });
      const picker = document.getElementById('pathColorPicker');
      if (picker) picker.value = color;

      render();
    }

    function bgToHex(rgb) {
      if (!rgb) return "";
      if (rgb.startsWith('#')) return rgb.toLowerCase();
      const match = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
      if (!match) return rgb.toLowerCase();
      const r = parseInt(match[1]).toString(16).padStart(2, '0');
      const g = parseInt(match[2]).toString(16).padStart(2, '0');
      const b = parseInt(match[3]).toString(16).padStart(2, '0');
      return `#${r}${g}${b}`;
    }

    function setArrowsEnabled(enabled) {
      isArrowsEnabled = enabled;
      localStorage.setItem('hps-arrows-enabled', enabled ? 'true' : 'false');
      const chk = document.getElementById('toggleArrows');
      if (chk) chk.checked = enabled;
      render();
    }

    // 루프 활성화 토글
    function setLoopEnabled(enabled) {
      isLoopEnabled = enabled;
      localStorage.setItem('hps-loop-enabled', enabled ? 'true' : 'false');
      const chk = document.getElementById('toggleLoop');
      if (chk) chk.checked = enabled;
      render();
    }

    // 초기 UI 설정 적용
    function applyInitialSettings() {
      document.documentElement.style.setProperty('--path-color', pathColor);
      const presets = document.querySelectorAll('.preset-btn');
      presets.forEach(btn => {
        if (bgToHex(btn.style.backgroundColor) === pathColor.toLowerCase()) {
          btn.classList.add('ring-2', 'ring-white', 'scale-110');
        } else {
          btn.classList.remove('ring-2', 'ring-white', 'scale-110');
        }
      });
      const picker = document.getElementById('pathColorPicker');
      if (picker) picker.value = pathColor;

      const chkArrows = document.getElementById('toggleArrows');
      if (chkArrows) chkArrows.checked = isArrowsEnabled;

      const chkLoop = document.getElementById('toggleLoop');
      if (chkLoop) chkLoop.checked = isLoopEnabled;

      // 앱 실행 초기 시뮬레이터 크기는 100% 맵 크기 고정으로 시작
      updateMapScale(1.0);
      updateMapOpacity(0.8);
    }

    // 화면 렌더링
    function render() {
      const cfg = mapsConfig[currentTab];
      if (!cfg) return;

      const points = activePoints[currentTab] || [];
      
      // 고유 색상 수집 및 화살표 마커 defs 동적 생성
      const uniqueColors = new Set();
      uniqueColors.add(pathColor);
      points.forEach(p => {
        if (p[2]) uniqueColors.add(p[2]);
      });

      let markersHtml = '';
      uniqueColors.forEach(color => {
        const markerId = `arrow-${color.replace('#', '')}`;
        // 오버레이 모드일 때는 노드 구체가 가려지므로 화살표를 선 끝에 밀착(refX = 10), 일반 모드일 때는 노드 경계에 도킹(refX = 22)
        const refX = ((isOverlayMode ? 10 : 22) * currentScale).toFixed(2);
        const refY = (3.25 * currentScale).toFixed(2); // Y축 정렬 중앙값 정밀화
        const mWidth = (6.5 * currentScale).toFixed(2); // 화살표 크기 1.3배 확대
        const mHeight = (6.5 * currentScale).toFixed(2); // 화살표 크기 1.3배 확대
        markersHtml += `
          <marker id="${markerId}" viewBox="0 0 10 10" refX="${refX}" refY="${refY}" markerWidth="${mWidth}" markerHeight="${mHeight}" orient="auto-start-reverse">
            <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="${color}" />
          </marker>
        `;
      });

      mapImage.src = cfg.image;
      svg.innerHTML = `<defs>${markersHtml}</defs>`;
      
      // 1. 경로 선 (삽입 영역 포함)
      if (points.length > 1) {
        const segmentsCount = isLoopEnabled ? points.length : points.length - 1;
        for (let i = 0; i < segmentsCount; i++) {
          const nextIdx = (i + 1) % points.length;
          const p1 = gameToPixel(points[i][0], points[i][1]);
          const p2 = gameToPixel(points[nextIdx][0], points[nextIdx][1]);
          
          const segColor = points[i][2] || pathColor;
          const markerId = `arrow-${segColor.replace('#', '')}`;

          // 시각용 라인
          const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
          line.setAttribute("x1", p1.x); line.setAttribute("y1", p1.y);
          line.setAttribute("x2", p2.x); line.setAttribute("y2", p2.y);
          line.setAttribute("class", "path-line");
          line.style.stroke = segColor; // 인라인 스타일로 오버라이딩 적용
          line.style.strokeWidth = (5.0 * currentScale) + 'px'; // 스케일 비례 선 두께 동적 설정 (기존 3.5에서 5.0으로 굵기 상향)
          if (isArrowsEnabled) {
            line.setAttribute("marker-end", `url(#${markerId})`);
          }
          svg.appendChild(line);

          // 삽입 감지용 두꺼운 투명 라인
          const lineHitbox = document.createElementNS("http://www.w3.org/2000/svg", "line");
          lineHitbox.setAttribute("x1", p1.x); lineHitbox.setAttribute("y1", p1.y);
          lineHitbox.setAttribute("x2", p2.x); lineHitbox.setAttribute("y2", p2.y);
          lineHitbox.setAttribute("class", "path-hitbox");
          lineHitbox.onmousedown = (e) => {
            if (e.ctrlKey && e.button === 0) {
              e.preventDefault(); e.stopPropagation();
              const rect = mapContainer.getBoundingClientRect();
              const newGameCoord = pixelToGame(e.clientX - rect.left, e.clientY - rect.top);
              
              if (i === points.length - 1) {
                // 루프 선인 경우(마지막 -> 첫번째 연결선) 끝에 노드 추가 (색상=undefined)
                points.push([newGameCoord[0], newGameCoord[1]]);
              } else {
                // 중간 삽입: 앞선 세그먼트의 색상을 분할된 뒷선에도 승계
                points.splice(i + 1, 0, [newGameCoord[0], newGameCoord[1], points[i][2]]);
              }
              render();
              
              // 실시간 DB 저장
              window.electronAPI.saveHuntingPath(currentTab, points);
            }
          };

          // 선 우클릭 시 미니 컬러 팔레트 팝업 호출
          lineHitbox.oncontextmenu = (e) => {
            e.preventDefault(); e.stopPropagation();
            showSegmentColorPopup(e.clientX, e.clientY, i);
          };

          svg.appendChild(lineHitbox);
        }
      }

      // 2. 경로 노드 그리기
      points.forEach((p, i) => {
        const pix = gameToPixel(p[0], p[1]);
        
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", pix.x); circle.setAttribute("cy", pix.y);
        circle.setAttribute("r", "8");
        let cls = "node";
        if (i === 0) cls += " start";
        if (i === points.length - 1) cls += " end";
        if (i === draggingIdx) cls += " active";
        circle.setAttribute("class", cls);
        
        // 중간 일반 노드의 색상은 해당 세그먼트 선 색상과 일치하게 연동
        if (i !== 0 && i !== points.length - 1 && i !== draggingIdx) {
          const segColor = p[2] || pathColor;
          circle.setAttribute("fill", segColor);
        }

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", pix.x);
        text.setAttribute("y", pix.y);
        text.setAttribute("class", "node-text");
        text.textContent = i + 1;

        const hitbox = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        hitbox.setAttribute("cx", pix.x); hitbox.setAttribute("cy", pix.y);
        hitbox.setAttribute("r", "15");
        hitbox.setAttribute("class", "node-hitbox");
        
        hitbox.onmousedown = (e) => {
          if (e.button === 0 && !e.ctrlKey) { 
            e.preventDefault(); e.stopPropagation();
            draggingIdx = i;
            const rect = mapContainer.getBoundingClientRect();
            dragOffset.x = (e.clientX - rect.left) - pix.x;
            dragOffset.y = (e.clientY - rect.top) - pix.y;
            render();
          }
        };

        hitbox.oncontextmenu = (e) => {
          e.preventDefault(); e.stopPropagation();
          deleteNode(i);
        };

        svg.appendChild(hitbox);
        svg.appendChild(circle);
        svg.appendChild(text);
      });
    }

    // 맵 빈 공간 Ctrl+클릭 시 끝에 노드 추가
    svg.onmousedown = (e) => {
      if (e.ctrlKey && e.button === 0 && currentTab) {
        const rect = mapContainer.getBoundingClientRect();
        const newGameCoord = pixelToGame(e.clientX - rect.left, e.clientY - rect.top);
        activePoints[currentTab].push([newGameCoord[0], newGameCoord[1]]); // 튜플로 푸시
        render();
        
        // 실시간 DB 저장
        window.electronAPI.saveHuntingPath(currentTab, activePoints[currentTab]);
      }
    };

    // 노드 삭제 (최소 노드 수 제한 제거)
    function deleteNode(index) {
      const points = activePoints[currentTab];
      if (points && points.length > 0) {
        points.splice(index, 1);
        if (draggingIdx === index) draggingIdx = -1;
        render();
        
        // 실시간 DB 저장
        window.electronAPI.saveHuntingPath(currentTab, points);
      }
    }

    // 현재 사냥터 동선 전체 초기화
    function clearCurrentPath() {
      if (!currentTab) return;
      if (confirm('현재 사냥터의 모든 동선을 초기화하시겠습니까?')) {
        activePoints[currentTab] = [];
        draggingIdx = -1;
        render();
        
        // DB 저장 (빈 배열)
        window.electronAPI.saveHuntingPath(currentTab, []);
      }
    }

    // 드래그 감지
    window.addEventListener('mousemove', (e) => {
      if (draggingIdx === -1) return;
      const rect = mapContainer.getBoundingClientRect();
      const px = (e.clientX - rect.left) - dragOffset.x;
      const py = (e.clientY - rect.top) - dragOffset.y;
      
      const oldColor = activePoints[currentTab][draggingIdx][2];
      const [gx, gy] = pixelToGame(px, py);
      activePoints[currentTab][draggingIdx] = [gx, gy, oldColor];
      render();
    });

    window.addEventListener('mouseup', () => {
      if (draggingIdx !== -1) {
        draggingIdx = -1;
        render();
        
        // 드래그 종료 시 실시간 DB 저장
        window.electronAPI.saveHuntingPath(currentTab, activePoints[currentTab]);
      }
    });

    // 맵 스케일 조절 기능 (오버레이 모드 시 전용 저장소 저장)
    function updateMapScale(scale) {
      currentScale = parseFloat(scale);
      if (isOverlayMode) {
        localStorage.setItem('hps-overlay-scale', currentScale);
      }
      
      const percentText = Math.round(currentScale * 100) + '%';
      const panelScale = document.getElementById('panelScaleRange');
      if (panelScale) panelScale.value = currentScale;
      const panelScaleText = document.getElementById('panelScaleText');
      if (panelScaleText) panelScaleText.innerText = percentText;
      
      if (mapContainer) {
        mapContainer.style.width = (828 * currentScale) + 'px';
        mapContainer.style.height = (496 * currentScale) + 'px';
      }
      
      syncWindowBounds();
      render();
    }

    // 지도 불투명도 조절 기능 (오버레이 모드 시 전용 저장소 저장)
    function updateMapOpacity(opacity) {
      currentOpacity = parseFloat(opacity);
      if (isOverlayMode) {
        localStorage.setItem('hps-overlay-opacity', currentOpacity);
      }
      
      const percentText = Math.round(currentOpacity * 100) + '%';
      const panelOpacity = document.getElementById('panelOpacityRange');
      if (panelOpacity) panelOpacity.value = currentOpacity;
      const panelOpacityText = document.getElementById('panelOpacityText');
      if (panelOpacityText) panelOpacityText.innerText = percentText;
      
      if (mapImage) {
        mapImage.style.opacity = currentOpacity;
      }
    }

    // 윈도우 크기 동적 조절
    function syncWindowBounds() {
      const baseMapW = 828;
      const baseMapH = 496;
      let targetW, targetH;
      if (isOverlayMode) {
        targetW = baseMapW * currentScale;
        targetH = baseMapH * currentScale;
      } else {
        // 일반 편집 모드일 때는 창 사이즈를 원래 규격(860x800)으로 언제나 완벽 고정!
        targetW = 860;
        targetH = 800;
      }
      if (window.electronAPI && window.electronAPI.setWindowSize) {
        window.electronAPI.setWindowSize(targetW, targetH);
      }
    }

    // 오버레이 모드 활성화
    function enableOverlayMode() {
      isOverlayMode = true;
      document.body.classList.add('overlay-mode');
      
      const panel = document.getElementById('overlayControlPanel');
      if (panel) panel.classList.remove('hidden');
      
      // 오버레이 전용 스케일과 투명도 로드 (오버레이 모드 기본 스케일 70%, 투명도 20% 권장)
      const savedScale = parseFloat(localStorage.getItem('hps-overlay-scale')) || 0.7;
      const savedOpacity = parseFloat(localStorage.getItem('hps-overlay-opacity')) || 0.2;
      
      if (window.electronAPI) {
        if (window.electronAPI.setAlwaysOnTop) {
          window.electronAPI.setAlwaysOnTop(true);
        }
        if (window.electronAPI.setIgnoreMouseEvents) {
          window.electronAPI.setIgnoreMouseEvents(true, { forward: true });
        }
      }
      
      updateMapScale(savedScale);
      updateMapOpacity(savedOpacity);
    }

    // 오버레이 모드 비활성화
    function disableOverlayMode() {
      isOverlayMode = false;
      document.body.classList.remove('overlay-mode');
      
      const panel = document.getElementById('overlayControlPanel');
      if (panel) panel.classList.add('hidden');
      
      if (window.electronAPI) {
        if (window.electronAPI.setAlwaysOnTop) {
          window.electronAPI.setAlwaysOnTop(false);
        }
        if (window.electronAPI.setIgnoreMouseEvents) {
          window.electronAPI.setIgnoreMouseEvents(false);
        }
      }
      
      // 일반 편집 모드로 원복: 스케일 100%, 맵 투명도 80%, 창 크기 860x800 복원
      updateMapScale(1.0);
      updateMapOpacity(0.8);
    }

    // 플로팅 패널 마우스 진입/이탈 제어
    function onControlPanelMouseEnter() {
      if (isOverlayMode && window.electronAPI && window.electronAPI.setIgnoreMouseEvents) {
        window.electronAPI.setIgnoreMouseEvents(false);
      }
    }
    
    function onControlPanelMouseLeave() {
      if (isOverlayMode && window.electronAPI && window.electronAPI.setIgnoreMouseEvents) {
        window.electronAPI.setIgnoreMouseEvents(true, { forward: true });
      }
    }

    // 오버레이 미니 패널 드래그 창 이동 로직
    let isDraggingPanel = false;
    let dragStartMouse = { x: 0, y: 0 };
    let dragStartWin = { x: 0, y: 0 };

    function initPanelDrag(e) {
      if (e.button !== 0) return; // 좌클릭만
      isDraggingPanel = true;
      dragStartMouse.x = e.screenX;
      dragStartMouse.y = e.screenY;
      dragStartWin.x = window.screenX;
      dragStartWin.y = window.screenY;
      
      window.addEventListener('mousemove', handlePanelDrag);
      window.addEventListener('mouseup', stopPanelDrag);
      
      e.preventDefault();
    }

    function handlePanelDrag(e) {
      if (!isDraggingPanel) return;
      const dx = e.screenX - dragStartMouse.x;
      const dy = e.screenY - dragStartMouse.y;
      const newX = dragStartWin.x + dx;
      const newY = dragStartWin.y + dy;
      if (window.electronAPI && window.electronAPI.setWindowPosition) {
        window.electronAPI.setWindowPosition(newX, newY);
      }
    }

    function stopPanelDrag() {
      isDraggingPanel = false;
      window.removeEventListener('mousemove', handlePanelDrag);
      window.removeEventListener('mouseup', stopPanelDrag);
    }

    // 초기화 함수
    window.onload = async () => {
      try {
        if (window.bindEscapeClose) window.bindEscapeClose();
      } catch (e) {
        console.error('Failed to bind escape close:', e);
      }

      // 1. DB에서 사냥터 설정 정보 조회
      try {
        const grounds = await window.electronAPI.getHuntingGrounds();
        if (grounds && grounds.length > 0) {
          grounds.forEach(g => {
            mapsConfig[g.id] = {
              name: g.name,
              image: g.image_path,
              zoom: g.zoom,
              S: g.s,
              Ox: g.ox,
              Oy: g.oy,
              fX: g.fx,
              fY: g.fy,
              isSwap: !!g.is_swap
            };
          });
          currentTab = grounds[0].id;
        }
      } catch (e) {
        console.error('Failed to fetch hunting grounds:', e);
      }

      // 2. DB에서 저장된 경로 정보 조회
      for (let key in mapsConfig) {
        try {
          const savedPoints = await window.electronAPI.getHuntingPath(key);
          activePoints[key] = savedPoints || [];
        } catch (e) {
          console.error(`Failed to fetch hunting path for ${key}:`, e);
          activePoints[key] = [];
        }
      }

      initTabs();
      applyInitialSettings();
      render();
      
      if (window.lucide) {
        lucide.createIcons();
      }
    };
  </script>
  <!-- 미니 컬러 팔레트 팝업 -->
  <div id="segmentColorPopup" class="fixed hidden panel-glass rounded-2xl p-2.5 border border-white/10 bg-slate-955/95 shadow-2xl z-50 flex items-center gap-2 no-drag">
    <button onmousedown="changeSelectedSegmentColor('#34d399', true)" class="w-7 h-7 rounded-full border border-white/10 transition-transform hover:scale-110 active:scale-95" style="background-color: #34d399;" title="초록"></button>
    <button onmousedown="changeSelectedSegmentColor('#f87171', true)" class="w-7 h-7 rounded-full border border-white/10 transition-transform hover:scale-110 active:scale-95" style="background-color: #f87171;" title="빨강"></button>
    <button onmousedown="changeSelectedSegmentColor('#60a5fa', true)" class="w-7 h-7 rounded-full border border-white/10 transition-transform hover:scale-110 active:scale-95" style="background-color: #60a5fa;" title="파랑"></button>
    <button onmousedown="changeSelectedSegmentColor('#facc15', true)" class="w-7 h-7 rounded-full border border-white/10 transition-transform hover:scale-110 active:scale-95" style="background-color: #facc15;" title="노랑"></button>
    <button onmousedown="changeSelectedSegmentColor('#c084fc', true)" class="w-7 h-7 rounded-full border border-white/10 transition-transform hover:scale-110 active:scale-95" style="background-color: #c084fc;" title="보라"></button>
    <div class="h-4 w-px bg-white/10 mx-0.5"></div>
    <!-- 커스텀 컬러 피커 -->
    <div class="relative w-7 h-7 flex items-center justify-center rounded-full bg-black/40 border border-white/10 overflow-hidden transition-all hover:scale-105 active:scale-95">
      <input type="color" id="segmentColorPicker" oninput="changeSelectedSegmentColor(this.value, false)" class="absolute opacity-0 cursor-pointer w-full h-full">
      <i data-lucide="plus" class="w-4 h-4 text-slate-400 pointer-events-none"></i>
    </div>
  </div>

  <!-- 오버레이 모드용 미니 플로팅 제어 패널 -->
  <div id="overlayControlPanel" class="fixed hidden top-3 right-3 panel-glass rounded-xl p-3 border border-emerald-500/25 bg-slate-900/90 shadow-2xl z-50 flex flex-col gap-2.5 w-[180px] no-drag"
       onmouseenter="onControlPanelMouseEnter()" 
       onmouseleave="onControlPanelMouseLeave()">
    <div class="flex items-center justify-between border-b border-white/10 pb-1.5 mb-0.5 drag-header" onmousedown="initPanelDrag(event)">
      <span class="text-emerald-300 text-[11px] font-black flex items-center gap-1 pointer-events-none select-none">
        <i data-lucide="grip-horizontal" class="w-3.5 h-3.5 text-emerald-400"></i>
        오버레이 제어
      </span>
      <button onclick="disableOverlayMode()" onmousedown="event.stopPropagation()" class="px-1.5 py-0.5 rounded bg-red-500/10 hover:bg-red-500/20 text-red-400 text-[10px] font-bold border border-red-500/20 transition-all">
        편집 복귀
      </button>
    </div>
    
    <!-- 스케일 조절 -->
    <div class="flex flex-col gap-1">
      <div class="flex items-center justify-between text-[10px] text-slate-400">
        <span>맵 크기</span>
        <span id="panelScaleText" class="font-mono text-emerald-400 font-bold">100%</span>
      </div>
      <input type="range" id="panelScaleRange" min="0.2" max="1.0" step="0.01" value="1.0" oninput="updateMapScale(this.value)" class="w-full accent-emerald-500 bg-black/40 h-1 rounded-lg cursor-pointer">
    </div>
    
    <!-- 지도 투명도 조절 -->
    <div class="flex flex-col gap-1">
      <div class="flex items-center justify-between text-[10px] text-slate-400">
        <span>지도 투명도</span>
        <span id="panelOpacityText" class="font-mono text-emerald-400 font-bold">80%</span>
      </div>
      <input type="range" id="panelOpacityRange" min="0" max="1" step="0.1" value="0.8" oninput="updateMapOpacity(this.value)" class="w-full accent-emerald-500 bg-black/40 h-1 rounded-lg cursor-pointer">
    </div>
  </div>
</body>
</html>
