<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <script src="assets/tailwind.min.js"></script>
  <script src="assets/lucide.min.js"></script>

  <script>
    window.addEventListener('beforeunload', () => {
      if (window.electronAPI && window.electronAPI.cleanupAllListeners) {
        window.electronAPI.cleanupAllListeners();
      }
    });
  </script>
</head>

<body>
  <div id="wrapper" class="sidebar-wrapper">
    <!-- 사이드바 접기/펴기 -->
    <div class="toggle-btn cursor-pointer" onclick="window.electronAPI.toggleSidebar()" title="사이드바 토글">
      <i id="toggle-icon" data-lucide="chevron-left"></i>
    </div>

    <!-- 동적 메뉴 영역 -->
    <div id="dynamic-menus" class="flex flex-col gap-0.5"></div>

    <!-- 퀵슬롯 컨테이너 -->
    <div id="slot-container" class="slot-container flex flex-col gap-2 mt-2"></div>

    <!-- 시스템 하단 버튼 영역 -->
    <div id="system-menus" class="mt-auto flex flex-col gap-0.5"></div>

    <!-- 커피 후원 버튼 -->
    <div class="p-2 cursor-pointer text-[#FFDD00]/90 hover:text-[#FFDD00] hover:scale-110 transition-transform relative"
      onclick="window.electronAPI.openExternal('https://buymeacoffee.com/drt0927')"
      onmouseenter="showTooltip('개발자에게 커피 후원하기 ☕', this)" onmouseleave="hideTooltip()">
      <i data-lucide="coffee" class="w-4 h-4"></i>
    </div>

    <div class="p-2 cursor-pointer text-slate-400 hover:text-purple-400 relative"
      onclick="window.electronAPI.toggleSettings()" onmouseenter="showTooltip('환경 설정', this)"
      onmouseleave="hideTooltip()">
      <i data-lucide="settings" class="w-4 h-4"></i>
      <span id="update-badge" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full hidden"></span>
    </div>

    <div class="p-2 pb-4 cursor-pointer text-slate-400 hover:text-red-500" onclick="window.electronAPI.closeApp()"
      onmouseenter="showTooltip('앱 종료', this)" onmouseleave="hideTooltip()">
      <i data-lucide="power" class="w-4 h-4"></i>
    </div>
  </div>

  <!-- 툴팁 -->
  <div id="tooltip" class="tw-tooltip"></div>

  <!-- 알림 토스트 컨테이너 (스택형) -->
  <div id="toast-container" class="toast-container"></div>

  <!-- 오디오 재생기 -->
  <audio id="boss-audio" class="hidden"></audio>

  <script>
    // 전역 변수 선언
    const tooltip = document.getElementById('tooltip');
    const bossAudio = document.getElementById('boss-audio');
    const toastContainer = document.getElementById('toast-container');
    const wrapper = document.getElementById('wrapper');
    const REAL_BOSSES = ['골론', '파멸의 기원', '스페르첸드', '골모답', '아칸'];

    let bossNotifyVolume = 0.5;
    let currentHiddenMenuIds = [];
    let _lastRecordedBossKey = null;
    let lastConfig = null;
    let sidebarPos = 'right';
    let isCollapsed = false;

    function refreshIcons() { if (window.lucide) lucide.createIcons(); }

    function showTooltip(text, el) {
      const rect = el.getBoundingClientRect();
      tooltip.innerText = text;
      tooltip.style.top = `${rect.top + 4}px`;

      if (sidebarPos === 'left') {
        tooltip.style.left = 'auto';
        tooltip.style.right = '42px'; // 본체 왼쪽(공백 쪽)으로 표시
      } else {
        tooltip.style.left = '42px'; // 본체 오른쪽(공백 쪽)으로 표시
        tooltip.style.right = 'auto';
      }

      tooltip.style.display = 'flex';
    }

    function hideTooltip() {
      tooltip.style.display = 'none';
    }

    // --- 동적 메뉴 로딩 ---
    async function initDynamicMenus() {
      try {
        const response = await fetch('assets/data/sidebar_menus.json');
        const menus = await response.json();

        const dynamicContainer = document.getElementById('dynamic-menus');
        const systemContainer = document.getElementById('system-menus');
        dynamicContainer.innerHTML = '';
        systemContainer.innerHTML = '';

        menus.forEach(menu => {
          const btn = document.createElement('div');
          btn.id = menu.id;
          btn.className = `p-2 cursor-pointer text-slate-400 hover:text-${menu.color} relative`;
          // 오버레이 토글 아이콘 등은 동적으로 변할 수 있으므로 초기값만 설정
          btn.innerHTML = `<i data-lucide="${menu.icon}" class="${menu.id.includes('icon') ? '' : 'w-4 h-4'}"></i>`;
          if (menu.id === 'overlay-toggle-btn') btn.querySelector('i').id = 'overlay-icon';
          if (menu.id === 'click-through-btn') btn.querySelector('i').id = 'click-through-icon';

          if (menu.id === 'gallery-btn') {
            btn.innerHTML += `<span id="noti-badge" class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full hidden"></span>`;
          }

          btn.onclick = () => {
            if (menu.action === 'openGallery') openGallery();
            else if (menu.api && window.electronAPI[menu.api]) window.electronAPI[menu.api]();
          };

          btn.onmouseenter = () => showTooltip(menu.tooltip, btn);
          btn.onmouseleave = () => hideTooltip();

          if (menu.isSystem) systemContainer.appendChild(btn);
          else dynamicContainer.appendChild(btn);
        });

        refreshIcons();
        applyMenuVisibility();
      } catch (e) { console.error('Failed to load dynamic menus:', e); }
    }

    function applyMenuVisibility() {
      const containers = [document.getElementById('dynamic-menus'), document.getElementById('system-menus')];
      containers.forEach(container => {
        if (!container) return;
        Array.from(container.children).forEach(el => {
          if (el.id) {
            el.style.display = currentHiddenMenuIds.includes(el.id) ? 'none' : 'flex';
          }
        });
      });
    }

    // 마우스 투과 제어 통합 함수
    function updateIgnoreMouseEvents(ignore) {
      if (window.electronAPI && window.electronAPI.setIgnoreMouseEvents) {
        window.electronAPI.setIgnoreMouseEvents(ignore, ignore ? { forward: true } : undefined);
      }
    }

    function createToast(bossName, isCustomFromApi, spawnTime, offset, isAlreadyRecorded) {
      const isRealBoss = REAL_BOSSES.includes(bossName) && !isCustomFromApi;
      const toastId = 'toast-' + Date.now();

      const toast = document.createElement('div');
      toast.id = toastId;
      toast.className = 'boss-toast show';

      const iconName = isRealBoss ? 'skull' : 'bell-ring';
      const iconColor = isRealBoss ? 'text-[#a855f7]' : 'text-amber-400';

      let displayName = bossName;
      const validSpawnTime = (spawnTime && spawnTime !== 'undefined' && spawnTime !== 'null') ? spawnTime : null;

      if (isRealBoss && validSpawnTime) {
        displayName = `[${validSpawnTime}] ${bossName}`;
        if (offset > 0) displayName += ` <span class="text-[10px] text-slate-500 font-medium ml-1">${offset}분 전</span>`;
      }

      const buttonHtml = isAlreadyRecorded
        ? `<button disabled class="px-3 py-1.5 flex items-center gap-1.5 bg-slate-700 text-slate-400 rounded-lg transition-all text-[11px] font-bold cursor-default">
            <i data-lucide="info" class="w-3.5 h-3.5"></i>
            이미 기록됨!
          </button>`
        : `<button onclick="recordKillAndRemove('${toastId}', '${bossName}', '${validSpawnTime || ''}', event)" class="cursor-custom-sword px-3 py-1.5 flex items-center gap-1.5 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-lg hover:bg-emerald-500 hover:text-white transition-all text-[11px] font-bold">
            <i data-lucide="sword" class="w-3.5 h-3.5"></i>
            일지 기록
          </button>`;

      toast.innerHTML = `
        <div class="flex items-start justify-between w-full gap-3">
          <div class="flex items-start gap-2.5 pt-0.5">
            <i data-lucide="${iconName}" class="w-4 h-4 ${iconColor} mt-0.5 shrink-0"></i>
            <span class="boss-toast-name flex-1 leading-snug break-keep">${displayName}</span>
          </div>
          <button onclick="removeToast('${toastId}', event)" class="p-1 text-slate-400 hover:text-white bg-white/5 hover:bg-red-500/80 rounded-md transition-colors shrink-0">
            <i data-lucide="x" class="w-3.5 h-3.5"></i>
          </button>
        </div>
        ${isRealBoss ? `
        <div class="mt-3 flex justify-end w-full border-t border-slate-700/50 pt-2">
          ${buttonHtml}
        </div>` : ''}
      `;

      toastContainer.appendChild(toast);
      refreshIcons();
      updateIgnoreMouseEvents(false);
      updateSidebarWindowWidth(400); // 알림 생성 시 즉시 너비 확장 (짤림 방지)

      // 자동 삭제 타이머
      let duration = 5000; // 커스텀 알림 기본 5초
      if (isRealBoss) {
        duration = (offset === 0) ? 60000 : 30000; // 정각 알림은 1분, N분 전 알림은 30초
      }
      setTimeout(() => { removeToast(toastId); }, duration);
    }

    function removeToast(id, event) {
      if (event) event.stopPropagation();
      const toast = document.getElementById(id);
      if (toast) {
        toast.classList.remove('show');
        setTimeout(() => {
          if (toast.parentElement) toast.remove();
          if (toastContainer.children.length === 0) {
            updateIgnoreMouseEvents(true);
          }
        }, 300);
      }
    }

    async function recordKillAndRemove(toastId, bossName, spawnTime, event) {
      if (event) event.stopPropagation();

      const recordKey = `${bossName}-${spawnTime}`;
      // 1차 필터: 현재 세션 내 메모리 체크 (가장 빠름)
      if (_lastRecordedBossKey === recordKey) {
        const toast = document.getElementById(toastId);
        if (toast) {
          const btn = toast.querySelector('button[onclick^="recordKillAndRemove"]');
          if (btn) {
            btn.innerHTML = `<i data-lucide="info" class="w-3.5 h-3.5"></i> 이미 기록됨!`;
            btn.disabled = true;
            btn.className = "px-3 py-1.5 flex items-center gap-1.5 bg-slate-700 text-slate-400 rounded-lg transition-all text-[11px] font-bold cursor-default";
            refreshIcons();
          }
          setTimeout(() => { removeToast(toastId); }, 1500);
        }
        return;
      }

      const vol = (lastConfig && lastConfig.volumeCalculators !== undefined ? lastConfig.volumeCalculators : 50) / 100;
      if (vol > 0) {
        const audio = new Audio('assets/sound/item_get.wav');
        audio.volume = vol;
        audio.play().catch(e => { });
      }

      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const dateStr = String(now.getDate()).padStart(2, '0');
      const date = `${year}-${month}-${dateStr}`;
      const recordTime = (spawnTime && spawnTime !== 'null' && spawnTime !== '') ? (spawnTime + ':00') : (String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0') + ':' + String(now.getSeconds()).padStart(2, '0'));
      const content = `[${bossName}] ${spawnTime || recordTime.substring(0, 5)} 스폰 처치 완료`;

      try {
        // 2차 필터: DB 실제 존재 여부 확인 (최종 보루)
        const isSuccess = await window.electronAPI.diaryAddActivity(date, recordTime, 'boss', content);

        const toast = document.getElementById(toastId);
        if (toast) {
          const btn = toast.querySelector('button[onclick^="recordKillAndRemove"]');
          if (btn) {
            if (isSuccess) {
              _lastRecordedBossKey = recordKey;
              btn.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5"></i> 기록 완료!`;
              btn.className = "px-3 py-1.5 flex items-center gap-1.5 bg-emerald-500 text-white rounded-lg transition-all text-[11px] font-bold opacity-70 cursor-default";
            } else {
              btn.innerHTML = `<i data-lucide="info" class="w-3.5 h-3.5"></i> 이미 기록됨!`;
              btn.className = "px-3 py-1.5 flex items-center gap-1.5 bg-slate-700 text-slate-400 rounded-lg transition-all text-[11px] font-bold cursor-default";
            }
            btn.disabled = true;
            refreshIcons();
          }
          setTimeout(() => { removeToast(toastId); }, isSuccess ? 1000 : 1500);
        }
      } catch (err) { console.error('Failed to record boss kill:', err); }
    }

    function updateOverlayIcon(isVisible) {
      const iconContainer = document.getElementById('overlay-toggle-btn');
      if (iconContainer) {
        iconContainer.innerHTML = `<i id="overlay-icon" data-lucide="${isVisible ? 'layout-template' : 'layout'}" class="w-4 h-4 ${isVisible ? 'text-white' : 'text-slate-600'}"></i>`;
        refreshIcons();
      }
    }

    function openGallery() { document.getElementById('noti-badge').classList.add('hidden'); window.electronAPI.toggleGallery(); }

    // IPC 리스너 등록
    window.electronAPI.onPlaySound(({ label, soundFile, volume, isCustom, spawnTime, offset, isAlreadyRecorded }) => {
      if (!soundFile) return;
      bossAudio.src = `assets/sound/${soundFile}`;
      bossAudio.volume = (volume !== undefined && volume !== null) ? volume / 100 : bossNotifyVolume;
      bossAudio.play().catch(e => console.error('Audio play failed:', e));
      const btn = document.getElementById('boss-btn');
      if (btn) { btn.classList.add('animate-bounce', 'text-blue-400'); setTimeout(() => btn.classList.remove('animate-bounce'), 5000); }
      createToast(label, isCustom, spawnTime, offset, isAlreadyRecorded);
    });

    window.electronAPI.onSidebarStatus((collapsed) => {
      isCollapsed = collapsed;
      wrapper.className = isCollapsed ? 'sidebar-wrapper collapsed' : 'sidebar-wrapper';

      let iconName = 'chevron-left';
      if (sidebarPos === 'left') {
        iconName = isCollapsed ? 'chevron-left' : 'chevron-right';
      } else {
        iconName = isCollapsed ? 'chevron-right' : 'chevron-left';
      }

      document.getElementById('toggle-icon').setAttribute('data-lucide', iconName);
      tooltip.style.display = 'none';
      refreshIcons();
    });

    window.electronAPI.onOverlayStatus(updateOverlayIcon);

    window.electronAPI.onClickThroughStatus((isClickThrough) => {
      const icon = document.getElementById('click-through-icon');
      const btn = document.getElementById('click-through-btn');
      if (isClickThrough) { icon.setAttribute('data-lucide', 'mouse-pointer-off'); btn.classList.add('text-green-400'); btn.classList.remove('text-slate-400'); }
      else { icon.setAttribute('data-lucide', 'mouse-pointer-2'); btn.classList.add('text-slate-400'); btn.classList.remove('text-green-400'); }
      refreshIcons();
    });

    window.electronAPI.onConfigData((config) => {
      lastConfig = config;
      sidebarPos = config.sidebarPosition || 'right';

      // CSS 데이터 속성 부여 (레이아웃 자동 전환용)
      document.body.dataset.sidebarPos = sidebarPos;

      // 왼쪽 배치: 리사이즈 시 X 좌표 이동(gX-width)이 깜박임을 유발하므로 400px 고정
      if (sidebarPos === 'left' && currentWidth !== 400) {
        performWidthUpdate(400);
      }

      // 화살표 방향 갱신
      let iconName = 'chevron-left';
      if (sidebarPos === 'left') {
        iconName = isCollapsed ? 'chevron-left' : 'chevron-right';
      } else {
        iconName = isCollapsed ? 'chevron-right' : 'chevron-left';
      }
      document.getElementById('toggle-icon').setAttribute('data-lucide', iconName);

      bossNotifyVolume = (config.fieldBossNotifyVolume !== undefined ? config.fieldBossNotifyVolume : 50) / 100;

      currentHiddenMenuIds = config.hiddenMenuIds || [];
      applyMenuVisibility();

      updateOverlayIcon(config.overlayVisible !== false);
      const container = document.getElementById('slot-container');
      container.innerHTML = '';
      (config.quickSlots || []).forEach(slot => {
        const btn = document.createElement('div');
        btn.className = 'tw-slot';
        btn.innerHTML = slot.iconType === 'text' && slot.textChar ? `<span class="tw-slot-text">${slot.textChar}</span>` : `<i data-lucide="${slot.icon || 'link'}"></i>`;
        if (slot.external) { const dot = document.createElement('div'); dot.className = 'external-dot'; btn.appendChild(dot); }
        btn.onmouseenter = () => showTooltip(slot.label || 'LINK', btn);
        btn.onmouseleave = () => hideTooltip();
        btn.onclick = () => { if (slot.external) window.electronAPI.openExternal(slot.url); else window.electronAPI.navigate(slot.url); };
        container.appendChild(btn);
      });
      refreshIcons();
      if (!window._sidebarInitialized) { window.electronAPI.sidebarReady(); window._sidebarInitialized = true; }
    });

    initDynamicMenus();
    window.electronAPI.onGalleryNewActivity(() => { document.getElementById('noti-badge').classList.remove('hidden'); });
    window.electronAPI.onUpdateStatus((data) => {
      const badge = document.getElementById('update-badge');
      if (badge) {
        if (data.state === 'available' || data.state === 'ready') badge.classList.remove('hidden');
        else badge.classList.add('hidden');
      }
    });

    // 마우스 이벤트 및 창 크기 동적 제어
    let currentWidth = 400;
    let isResizing = false;
    let resizeTimer = null;
    let shrinkTimer = null;

    function updateSidebarWindowWidth(neededWidth) {
      // 왼쪽 배치: width 변경 → X좌표 이동(gX-width) → 윈도우 350px 점프 → 깜박임
      // 오른쪽 배치: X 고정(gX+gW) → width만 변경 → 시각적 문제 없음
      if (sidebarPos === 'left') return;

      // 확장 요청 시: 진행 중인 축소 타이머를 항상 취소 (currentWidth 상태와 무관하게 선제 취소)
      if (neededWidth !== 50 && shrinkTimer) {
        clearTimeout(shrinkTimer);
        shrinkTimer = null;
      }

      if (currentWidth !== neededWidth) {
        if (neededWidth === 50) {
          // 좁아질 때는 200ms 지연을 주어 깜박임 방지 (Debounce)
          if (shrinkTimer) return; 
          shrinkTimer = setTimeout(() => {
            performWidthUpdate(50);
            shrinkTimer = null;
          }, 200);
        } else {
          // 넓어질 때는 즉시 반응
          performWidthUpdate(neededWidth);
        }
      }
    }

    function performWidthUpdate(width) {
      currentWidth = width;
      isResizing = true;
      if (resizeTimer) clearTimeout(resizeTimer);

      window.electronAPI.applySettings({ isSidebarResize: true, width: width });

      resizeTimer = setTimeout(() => {
        isResizing = false;
      }, 300);
    }

    function checkMouseIgnore(e) {
      if (isResizing) return;

      // 1. 사이드바 본체(wrapper) 요소의 실제 경계를 기준으로 마우스 위치 판정
      // window.innerWidth 기반 계산은 창 크기 변화(50↔400) 시 좌표 불일치로 깜박임 유발
      const wrapperRect = wrapper.getBoundingClientRect();
      const hitPadding = 14;
      const isOverSidebar = (
        e.clientX >= wrapperRect.left - hitPadding &&
        e.clientX <= wrapperRect.right + hitPadding &&
        e.clientY >= wrapperRect.top - hitPadding &&
        e.clientY <= wrapperRect.bottom + hitPadding
      );

      // 2. 알림 토스트 위에 있는지 확인
      const activeToasts = toastContainer.querySelectorAll('.boss-toast');
      let isOverToast = false;
      activeToasts.forEach(toast => {
        const rect = toast.getBoundingClientRect();
        if (e.clientX >= rect.left && e.clientX <= rect.right && 
            e.clientY >= rect.top && e.clientY <= rect.bottom) {
          isOverToast = true;
        }
      });
      const hasToasts = activeToasts.length > 0;

      if (isOverSidebar || isOverToast) {
        updateIgnoreMouseEvents(false);
        updateSidebarWindowWidth(400); // 상호작용 중엔 넓게 유지
      } else {
        updateIgnoreMouseEvents(true);
        // 토스트가 하나도 없을 때만 너비를 줄여서 드래그 방해 방지
        if (!hasToasts) {
          updateSidebarWindowWidth(50); 
        } else {
          updateSidebarWindowWidth(400); // 토스트가 있으면 공간 유지
        }
      }
    }
    // 전역 마우스 이동 감시
    window.addEventListener('mousemove', checkMouseIgnore);

    // 초기 상태 설정
    updateIgnoreMouseEvents(true);
    updateSidebarWindowWidth(50); // 시작 시엔 좁게 설정

    refreshIcons();
  </script>
</body>

</html>
