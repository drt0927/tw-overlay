<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="assets/tailwind.min.js"></script>
    <script src="assets/lucide.min.js"></script>
    <style>
        body {
            background: transparent;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        .shout-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .shout-card:hover {
            background: rgba(168, 85, 247, 0.05);
            border-color: rgba(168, 85, 247, 0.3);
            transform: translateY(-2px);
        }

        .shout-card:active {
            transform: scale(0.98);
        }

        .sender-badge {
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 900;
        }

        .copy-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(168, 85, 247, 0.95);
            color: white;
            padding: 10px 24px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 800;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
        }

        .copy-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Chrome Highlight API Style */
        ::highlight(search-results) {
            background-color: rgba(168, 85, 247, 0.5);
            color: white;
            text-decoration: underline;
        }
    </style>
</head>

<body class="panel-glass p-0 h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <div class="win-header shrink-0">
        <div class="win-title-area">
            <div class="win-icon-box bg-purple-500/10 border-purple-500/20">
                <i data-lucide="message-square-more" class="w-5 h-5 text-purple-400"></i>
            </div>
            <div class="win-title-text">
                <span class="win-title-main">외치기 히스토리</span>
                <span class="win-title-sub">최근 24시간 기록</span>
            </div>
        </div>
        <div class="win-controls">
            <button onclick="loadHistory(currentSearch)" class="win-btn" title="새로고침">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
            <button onclick="window.close()" class="win-btn win-close-btn" title="닫기">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="px-6 py-4 border-b border-white/5 bg-black/20 no-drag shrink-0">
        <div class="relative group">
            <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500 group-focus-within:text-purple-400 transition-colors"></i>
            <input type="text" id="shout-search" 
                placeholder="아이템명 또는 유저명 검색..." 
                class="w-full bg-black/40 border border-white/10 rounded-xl pl-10 pr-4 py-2.5 text-xs font-bold text-slate-200 outline-none focus:border-purple-500/50 transition-all placeholder:text-slate-600"
                oninput="handleSearch(this.value)">
        </div>
    </div>

    <!-- Content: 스크롤 영역 -->
    <div id="history-list" class="flex-1 overflow-y-auto px-6 py-6 space-y-4 custom-scroll no-drag">
        <div class="flex flex-col items-center justify-center py-20 text-slate-600 gap-3">
            <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-purple-500"></i>
            <span class="text-xs font-bold uppercase tracking-widest opacity-50">불러오는 중...</span>
        </div>
    </div>

    <!-- Copy Toast -->
    <div id="copy-toast" class="copy-toast flex items-center gap-2">
        <i data-lucide="check-circle-2" class="w-4 h-4 text-white"></i>
        <span>닉네임이 클립보드에 복사되었습니다!</span>
    </div>

    <script src="assets/ui-utils.js"></script>
    <script>
        let currentSearch = '';
        let searchTimer = null;
        let toastTimer = null;

        // Highlight API 초기화
        const searchHighlight = new Highlight();
        if (CSS.highlights) {
            CSS.highlights.set("search-results", searchHighlight);
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                showToast();
            } catch (err) { console.error('Failed to copy:', err); }
        }

        function showToast() {
            const toast = document.getElementById('copy-toast');
            toast.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
                toastTimer = null;
            }, 2000);
        }

        async function loadHistory(query = '') {
            const history = await window.electronAPI.getShoutHistory(24, query);
            const list = document.getElementById('history-list');
            
            if (!history || history.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-24 text-slate-700 gap-4">
                        <i data-lucide="message-square-dashed" class="w-12 h-12 opacity-20"></i>
                        <div class="text-center">
                            <p class="text-sm font-black italic">${query ? '검색 결과가 없습니다.' : '기록된 외치기가 없습니다.'}</p>
                            <p class="text-[10px] mt-1 opacity-50">${query ? '다른 키워드로 검색해보세요.' : '최근 24시간 동안 발생한 로그가 없습니다.'}</p>
                        </div>
                    </div>`;
                window.refreshIcons();
                searchHighlight.clear();
                return;
            }

            const fragment = document.createDocumentFragment();
            history.forEach(item => {
                const date = new Date(item.timestamp * 1000);
                const timeStr = date.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                const div = document.createElement('div');
                div.className = 'shout-card p-4 rounded-2xl flex flex-col gap-3 shadow-lg';
                div.onclick = () => copyToClipboard(item.sender);

                div.innerHTML = `
                    <div class="flex justify-between items-center pointer-events-none">
                        <div class="flex items-center gap-2">
                            <span class="sender-badge">${escapeHtml(item.sender)}</span>
                            <span class="text-[10px] font-mono font-bold text-slate-600">${timeStr}</span>
                        </div>
                        <i data-lucide="copy" class="w-3.5 h-3.5 text-slate-700"></i>
                    </div>
                    <div class="text-xs font-medium leading-relaxed text-slate-300 break-all pl-2 border-l-2 border-purple-500/20 pointer-events-none">
                        ${escapeHtml(item.message)}
                    </div>
                `;
                fragment.appendChild(div);
            });
            
            list.innerHTML = '';
            list.appendChild(fragment);
            window.refreshIcons();

            // Highlight 적용
            applyHighlights(query);
        }

        function applyHighlights(query) {
            if (!CSS.highlights) return;
            searchHighlight.clear();
            if (!query || !query.trim()) return;

            const list = document.getElementById('history-list');
            const treeWalker = document.createTreeWalker(list, NodeFilter.SHOW_TEXT);
            const lowerQuery = query.toLowerCase();

            let currentNode;
            while (currentNode = treeWalker.nextNode()) {
                const text = currentNode.textContent.toLowerCase();
                let startPos = 0;
                while ((startPos = text.indexOf(lowerQuery, startPos)) !== -1) {
                    const range = new Range();
                    range.setStart(currentNode, startPos);
                    range.setEnd(currentNode, startPos + query.length);
                    searchHighlight.add(range);
                    startPos += query.length;
                }
            }
        }

        function handleSearch(val) {
            currentSearch = val;
            if (searchTimer) clearTimeout(searchTimer);
            searchTimer = setTimeout(() => loadHistory(currentSearch), 300);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function refreshIcons() { if (window.lucide) lucide.createIcons(); }

        window.onload = () => {
            loadHistory();
            window.bindEscapeClose();
            if (window.electronAPI && window.electronAPI.onShoutHistoryUpdated) {
                window.electronAPI.onShoutHistoryUpdated(() => loadHistory(currentSearch));
            }
            setInterval(() => loadHistory(currentSearch), 60000);
        };
    </script>
</body>

</html>
