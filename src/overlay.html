<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <script src="assets/tailwind.min.js"></script>
  <script src="assets/lucide.min.js"></script>
</head>
<body class="bg-transparent text-white overflow-hidden select-none">
  <!-- 상단 컨트롤 바 -->
  <nav id="control-bar" class="glass h-10 flex items-center px-3 relative z-[5000]">
    <div id="loading-bar" class="absolute bottom-0 left-0 h-[2px] bg-purple-400 shadow-[0_0_10px_#c084fc] transition-all duration-500 opacity-0 w-0"></div>
    <div class="drag-region w-full h-full flex items-center gap-4">
      <div class="flex items-center text-slate-400 hover:text-white transition-colors cursor-move shrink-0">
        <i data-lucide="grip-vertical" class="w-4 h-4"></i>
      </div>

      <div class="flex-1 flex items-center no-drag bg-black/40 rounded border border-white/15 focus-within:border-purple-400 overflow-hidden">
        <input type="text" id="url-input" placeholder="주소 입력 또는 검색..." class="bg-transparent w-full px-3 py-1.5 text-xs text-white outline-none">
        <button id="go-btn" class="px-3 text-purple-400 hover:text-white transition-all border-l border-white/10"><i data-lucide="send" class="w-3.5 h-3.5"></i></button>
      </div>

      <div class="flex items-center gap-4 no-drag shrink-0">
        <div class="flex items-center gap-2 text-[11px] text-slate-300 bg-white/5 px-2 py-1 rounded border border-white/5">
          <i data-lucide="eye" class="w-3.5 h-3.5 text-slate-400"></i>
          <input type="range" id="opacity-slider" min="0.1" max="1.0" step="0.05" value="1.0" class="w-14 md:w-20">
        </div>
        <div id="status-indicator" class="text-[9px] font-black px-2.5 py-1 rounded bg-slate-700 text-slate-400 border border-white/10 uppercase">
          가능
        </div>
        <button onclick="window.electronAPI.toggleOverlay()" class="text-slate-400 hover:text-red-500 transition-colors p-1" title="오버레이 닫기">
          <i data-lucide="x" class="w-4.5 h-4.5"></i>
        </button>
      </div>
    </div>
  </nav>

  <script>
    function refreshIcons() { 
      if (typeof lucide !== 'undefined') {
        lucide.createIcons(); 
      }
    }
    
    const urlInput = document.getElementById('url-input');
    const goBtn = document.getElementById('go-btn');
    const opacitySlider = document.getElementById('opacity-slider');

    window.electronAPI.onConfigData((config) => {
      opacitySlider.value = config.opacity || 1.0;
    });

    window.electronAPI.onUrlChange((u) => { urlInput.value = u; });
    
    window.electronAPI.onLoadStatus((l) => {
      const lb = document.getElementById('loading-bar');
      lb.style.width = l ? '100%' : '0%';
      lb.style.opacity = l ? '1' : '0';
    });

    const fixUrl = (url) => {
      if (!url) return '';
      let t = url.trim();
      if (!t.startsWith('http://') && !t.startsWith('https://')) t = 'https://' + t;
      return t;
    };

    const nav = () => {
      let t = fixUrl(urlInput.value);
      if (t) window.electronAPI.navigate(t);
    };
    
    urlInput.onkeypress = (e) => { if (e.key === 'Enter') nav(); };
    goBtn.onclick = nav;

    opacitySlider.oninput = (e) => { window.electronAPI.setOpacity(parseFloat(e.target.value)); };

    window.electronAPI.onClickThroughStatus((s) => {
      const si = document.getElementById('status-indicator');
      si.innerText = s ? '투과' : '가능';
      si.className = 'text-[9px] font-black px-2.5 py-1 rounded uppercase transition-all ' +
        (s ? 'bg-violet-500 text-white' : 'bg-slate-700 text-slate-400');
    });

    // 창 로드 시 및 지연 호출을 통해 확실하게 아이콘 생성
    window.onload = refreshIcons;
    document.addEventListener('DOMContentLoaded', refreshIcons);
    setTimeout(refreshIcons, 100);
    setTimeout(refreshIcons, 500);
  </script>
</body>
</html>
